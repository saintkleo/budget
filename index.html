// ─── Insights Tab ─────────────────────────────────────────────────────────────
function renderInsights(s) {
  const curKey  = monthKey();
  const income  = getIncome(curKey);
  const spend   = getSpending(curKey);
  const view    = state.insightsView; // 'combined' | 'kyle' | 'kirsten'

  // ── Income input card ──────────────────────────────────────────────────────
  let html = `
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">${MONTHS[state.viewMonth]} Income</div>
  <div class="income-card">
    <div class="income-row">
      <div class="income-avatar avatar-kyle">K</div>
      <span class="income-label">${esc(pName("kyle"))}</span>
      <input class="income-inp" id="income-kyle" type="number" inputmode="decimal"
        placeholder="0.00" value="${income.kyle||''}"/>
    </div>
    <div class="income-row">
      <div class="income-avatar avatar-kirs">K</div>
      <span class="income-label">${esc(pName("kirsten"))}</span>
      <input class="income-inp" id="income-kirsten" type="number" inputmode="decimal"
        placeholder="0.00" value="${income.kirsten||''}"/>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--muted)">Combined income</span>
      <span style="font-size:16px;font-weight:800;font-family:monospace;color:${GREEN}">${fmt(income.kyle + income.kirsten)}</span>
    </div>
  </div>`;

  // ── Surplus / deficit for current month ───────────────────────────────────
  const kyleSurplus    = income.kyle    - spend.kyle;
  const kirstenSurplus = income.kirsten - spend.kirsten;
  const combIncome     = income.kyle + income.kirsten;
  const combSpend      = spend.total;
  const combSurplus    = combIncome - combSpend;

  if (combIncome > 0 || combSpend > 0) {
    const maxVal = Math.max(combIncome, combSpend, income.kyle, spend.kyle, income.kirsten, spend.kirsten, 1);
    const bar = (val, color, maxV) => {
      const pct = Math.min(100, Math.round(val/maxV*100));
      return `<div class="surplus-bar-fill" style="width:${pct}%;background:${color}"></div>`;
    };
    html += `
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">${MONTHS[state.viewMonth]} Snapshot</div>
    <div class="income-card">`;

    if (view === 'combined' || view === 'kyle') {
      html += `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:${KYLE}">${esc(pName("kyle"))}</span>
          <span style="font-size:11px;color:${kyleSurplus>=0?GREEN:'#f87171'};font-weight:700">
            ${kyleSurplus>=0?'+':''}${fmt(kyleSurplus)}
          </span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${GREEN}">Income</span>
          <div class="surplus-bar-track">${bar(income.kyle, GREEN, maxVal)}</div>
          <span class="surplus-val" style="color:${GREEN}">${fmt(income.kyle)}</span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${KYLE}">Spending</span>
          <div class="surplus-bar-track">${bar(spend.kyle, KYLE, maxVal)}</div>
          <span class="surplus-val" style="color:${KYLE}">${fmt(spend.kyle)}</span>
        </div>
      </div>`;
    }
    if (view === 'combined') {
      html += `<div style="height:1px;background:var(--border);margin-bottom:12px"></div>`;
    }
    if (view === 'combined' || view === 'kirsten') {
      html += `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:${KIRS}">${esc(pName("kirsten"))}</span>
          <span style="font-size:11px;color:${kirstenSurplus>=0?GREEN:'#f87171'};font-weight:700">
            ${kirstenSurplus>=0?'+':''}${fmt(kirstenSurplus)}
          </span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${GREEN}">Income</span>
          <div class="surplus-bar-track">${bar(income.kirsten, GREEN, maxVal)}</div>
          <span class="surplus-val" style="color:${GREEN}">${fmt(income.kirsten)}</span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${KIRS}">Spending</span>
          <div class="surplus-bar-track">${bar(spend.kirsten, KIRS, maxVal)}</div>
          <span class="surplus-val" style="color:${KIRS}">${fmt(spend.kirsten)}</span>
        </div>
      </div>`;
    }
    if (view === 'combined') {
      html += `<div style="height:1px;background:var(--border);margin-bottom:12px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted)">Household surplus</span>
        <span style="font-size:18px;font-weight:800;font-family:monospace;color:${combSurplus>=0?GREEN:'#f87171'}">${combSurplus>=0?'+':''}${fmt(combSurplus)}</span>
      </div>`;
    }
    html += `</div>`;
  }

  // ── Line chart (Income vs Spending over time) ─────────────────────────────
  html += `
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Income vs Spending</div>
  <div class="view-toggle">
    <button class="view-toggle-btn${view==='combined'?' active':''}" data-action="insights-view" data-view="combined">Combined</button>
    <button class="view-toggle-btn${view==='kyle'?' active':''}" data-action="insights-view" data-view="kyle">Kyle</button>
    <button class="view-toggle-btn${view==='kirsten'?' active':''}" data-action="insights-view" data-view="kirsten">Kirsten</button>
  </div>`;
  html += renderLineChart(view);

  // ── Pie chart ─────────────────────────────────────────────────────────────
  html += `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Spending Breakdown</div>`;
  html += renderPie(s);

  // ── Month history table ────────────────────────────────────────────────────
  const histEntries = Object.keys(state.monthData)
    .sort((a,b) => b.localeCompare(a))
    .slice(0, 12);

  if (histEntries.length > 0) {
    html += `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Month History</div>
    <div class="hist-card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 14px;border-bottom:1px solid var(--border)">
        <span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Month</span>
        <span style="font-size:9px;font-weight:700;color:${GREEN};text-transform:uppercase;letter-spacing:.1em;text-align:right">Income</span>
        <span style="font-size:9px;font-weight:700;color:var(--kyle);text-transform:uppercase;letter-spacing:.1em;text-align:right">Spend</span>
        <span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;text-align:right">Net</span>
      </div>`;

    histEntries.forEach(key => {
      const [yr, mo] = key.split('-').map(Number);
      const mLabel = MONTHS[mo-1].slice(0,3) + ' ' + String(yr).slice(2);
      const inc = getIncome(key);
      const sp  = getSpending(key);

      let totalInc, totalSpend;
      if (view === 'kyle')    { totalInc = inc.kyle;    totalSpend = sp.kyle; }
      else if (view==='kirsten') { totalInc = inc.kirsten; totalSpend = sp.kirsten; }
      else                    { totalInc = inc.kyle + inc.kirsten; totalSpend = sp.total; }

      const net = totalInc - totalSpend;
      const netColor = net >= 0 ? GREEN : '#f87171';
      const hasData = totalInc > 0 || totalSpend > 0;
      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:10px 14px;border-top:1px solid var(--border);${!hasData?'opacity:.4':''}">
        <span style="font-size:12px;font-weight:600;color:var(--text)">${mLabel}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:${GREEN};text-align:right">${totalInc>0?fmt(totalInc):'—'}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:var(--sub);text-align:right">${totalSpend>0?fmt(totalSpend):'—'}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:${netColor};text-align:right">${totalInc>0||totalSpend>0?(net>=0?'+':'')+fmt(net):'—'}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

// ─── Line Chart SVG ───────────────────────────────────────────────────────────
function renderLineChart(view) {
  const months = getChartMonths(6);
  const W = 520, H = 160, PAD = { top:16, right:12, bottom:32, left:56 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top  - PAD.bottom;

  // Gather data points
  const dataPoints = months.map(m => {
    const inc = getIncome(m.key);
    const sp  = getSpending(m.key);
    if (view === 'kyle')    return { incA: inc.kyle,    spA: sp.kyle,    label: m.label };
    if (view === 'kirsten') return { incA: inc.kirsten, spA: sp.kirsten, label: m.label };
    return { incA: inc.kyle + inc.kirsten, spA: sp.total, label: m.label };
  });

  const allVals = dataPoints.flatMap(d => [d.incA, d.spA]).filter(v => v > 0);
  const maxV = allVals.length ? Math.max(...allVals) * 1.15 : 5000;
  const minV = 0;
  const range = maxV - minV || 1;

  const toX = i  => PAD.left + (i / Math.max(dataPoints.length-1, 1)) * innerW;
  const toY = v  => PAD.top  + innerH - ((v - minV) / range) * innerH;

  const polyline = (pts, color, dash='') => {
    if (pts.every(p => p[1] === toY(0))) return ''; // all zero - skip
    const d = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
  };
  const dots = (pts, color) => pts
    .filter(p => p[2] > 0)
    .map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="${color}" stroke="var(--card)" stroke-width="2"/>`)
    .join('');

  const incPts  = dataPoints.map((d,i) => [toX(i), toY(d.incA), d.incA]);
  const spPts   = dataPoints.map((d,i) => [toX(i), toY(d.spA),  d.spA]);

  // Y axis ticks
  const ticks = 4;
  let yTicks = '';
  for (let t = 0; t <= ticks; t++) {
    const v = minV + (range / ticks) * t;
    const y = toY(v).toFixed(1);
    const label = v >= 1000 ? `$${(v/1000).toFixed(0)}k` : `$${Math.round(v)}`;
    yTicks += `<line x1="${PAD.left-4}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    yTicks += `<text x="${PAD.left-8}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${label}</text>`;
  }

  // X axis labels
  let xLabels = '';
  dataPoints.forEach((d,i) => {
    xLabels += `<text x="${toX(i).toFixed(1)}" y="${(H - PAD.bottom + 14).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${d.label}</text>`;
  });

  // Fill area under income line (subtle)
  const fillPts = [...incPts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`),
    `${toX(dataPoints.length-1).toFixed(1)},${toY(0).toFixed(1)}`,
    `${toX(0).toFixed(1)},${toY(0).toFixed(1)}`].join(' ');
  const incomeLine  = view==='kirsten' ? KIRS : KYLE;
  const spendLine   = view==='kyle' ? '#ea580c' : view==='kirsten' ? '#c026d3' : '#f59e0b';

  const noData = allVals.length === 0;

  // Legend
  const legendItems = view === 'combined'
    ? [{color:KYLE, label:'Combined Income', dash:''},{color:'#f59e0b', label:'Combined Spending', dash:'4,3'}]
    : view === 'kyle'
    ? [{color:KYLE, label:`${pName('kyle')} Income`, dash:''},{color:'#ea580c', label:`${pName('kyle')} Spending`, dash:'4,3'}]
    : [{color:KIRS, label:`${pName('kirsten')} Income`, dash:''},{color:'#c026d3', label:`${pName('kirsten')} Spending`, dash:'4,3'}];

  const legendHtml = legendItems.map(l =>
    `<div class="line-legend-item">
      <svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="${l.color}" stroke-width="2.5" stroke-dasharray="${l.dash}" stroke-linecap="round"/></svg>
      ${esc(l.label)}
    </div>`).join('');

  return `<div class="line-chart-wrap">
    <div class="line-chart-title">Income vs Spending</div>
    <div class="line-chart-sub">Last 6 months · ${view==='combined'?'Household':view==='kyle'?'Kyle':'Kirsten'}</div>
    ${noData ? `<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px">Enter income above to see your chart</div>` : `
    <svg id="line-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${yTicks}
      ${xLabels}
      <polygon points="${fillPts}" fill="${incomeLine}11"/>
      ${polyline(incPts, incomeLine)}
      ${polyline(spPts, spendLine, '4,3')}
      ${dots(incPts, incomeLine)}
      ${dots(spPts, spendLine)}
    </svg>`}
    <div class="line-legend">${legendHtml}</div>
  </div>`;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function attachEvents() {
  const content = document.getElementById('content');

  // Live field edits
  content.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', () => {
      const id=parseInt(el.dataset.id), field=el.dataset.field, type=el.dataset.type;
      const value = el.type==='number'?(parseFloat(el.value)||0):el.value;
      if (type==='bill') {
        state.bills = state.bills.map(b=>b.id===id?{...b,[field]:value}:b);
      } else if (type==='pcard') {
        const md = getMonthData();
        md.personalCards = (md.personalCards||[]).map(c=>c.id===id?{...c,[field]:value}:c);
      } else {
        const md = getMonthData();
        md.cards = md.cards.map(c=>c.id===id?{...c,[field]:value}:c);
      }
      document.getElementById('header-total-value').textContent = fmt(calcSettlement().grandTotal);
    });
  });

  // Income inputs — save silently on each keystroke, re-render only on blur
  ['kyle','kirsten'].forEach(who => {
    const inp = document.getElementById(`income-${who}`);
    if (!inp) return;
    // Save value on every keystroke without re-rendering (preserves focus & cursor)
    inp.addEventListener('input', () => {
      setIncome(monthKey(), who, parseFloat(inp.value)||0);
      saveState();
    });
    // Re-render the insights panel only after the user leaves the field
    inp.addEventListener('blur', () => {
      if (state.activeTab === 'insights') {
        const focusedId = inp.id; // remember which field just blurred
        const s = calcSettlement();
        document.getElementById('content').innerHTML = renderInsights(s);
        attachEvents();
        // Don't try to re-focus — user already left the field intentionally
      }
    });
  });

  // Action buttons
  content.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action=el.dataset.action, id=el.dataset.id?parseInt(el.dataset.id):null;

      if      (action==='toggle-cat') {
        const cat = el.dataset.cat;
        state.collapsedCats[cat] = !state.collapsedCats[cat];
        saveState(); render();
      }
      else if (action==='toggle-section') {
        const section = el.dataset.section;
        state.collapsedSections[section] = !state.collapsedSections[section];
        saveState(); render();
      }
      else if (action==='edit-bill')           { state.editingBill=id; render(); }
      else if (action==='done-edit-bill')      { state.editingBill=null; saveState(); render(); }
      else if (action==='delete-bill')         { state.bills=state.bills.filter(b=>b.id!==id); state.editingBill=null; saveState(); render(); }
      else if (action==='edit-card')           { state.editingCard=id; render(); }
      else if (action==='done-edit-card')      { state.editingCard=null; saveState(); render(); }
      else if (action==='delete-card')         { const md=getMonthData(); md.cards=md.cards.filter(c=>c.id!==id); state.editingCard=null; saveState(); render(); }
      else if (action==='show-add-bill')       { state.showAddBill=true; render(); }
      else if (action==='cancel-add-bill')     { state.showAddBill=false; render(); }
      else if (action==='show-add-card')       { state.showAddCard=true; render(); }
      else if (action==='cancel-add-card')     { state.showAddCard=false; render(); }
      else if (action==='confirm-add-bill') {
        const name=document.getElementById('nb-name').value.trim();
        const amount=parseFloat(document.getElementById('nb-amount').value)||0;
        const freq=document.getElementById('nb-freq').value;
        const paidBy=document.getElementById('nb-payer').value;
        const cat=document.getElementById('nb-cat').value;
        const note=document.getElementById('nb-note').value.trim();
        if (!name) return;
        state.bills.push({id:state.nextBillId++,name,amount,frequency:freq,paidBy,category:cat,note});
        state.showAddBill=false; saveState(); render();
      }
      else if (action==='edit-pcard')         { state.editingPersonalCard=id; render(); }
      else if (action==='done-edit-pcard')    { state.editingPersonalCard=null; saveState(); render(); }
      else if (action==='delete-pcard')       {
        const md=getMonthData();
        md.personalCards=(md.personalCards||[]).filter(c=>c.id!==id);
        state.editingPersonalCard=null; saveState(); render();
      }
      else if (action==='show-add-pcard')     { state.showAddPersonalCard=true; render(); }
      else if (action==='cancel-add-pcard')   { state.showAddPersonalCard=false; render(); }
      else if (action==='confirm-add-pcard')  {
        const name   = document.getElementById('npc-name').value.trim();
        const owner  = document.getElementById('npc-owner').value;
        const amount = parseFloat(document.getElementById('npc-amount').value)||0;
        const note   = document.getElementById('npc-note').value.trim();
        if (!name) return;
        const md = getMonthData();
        md.personalCards = md.personalCards || [];
        md.personalCards.push({id: md.nextPersonalId++, name, owner, amount, note});
        state.showAddPersonalCard=false; saveState(); render();
      }
      else if (action==='pie-mode') {
        state.pieMode = el.dataset.mode;
        saveState();
        render();
      }
      else if (action==='insights-view') {
        state.insightsView = el.dataset.view;
        saveState();
        render();
      }
      else if (action==='confirm-add-card') {
        const name=document.getElementById('nc-name').value.trim();
        const paidBy=document.getElementById('nc-payer').value;
        const totalAmount     = parseFloat(document.getElementById('nc-total')?.value)||0;
        const kyleExcluded    = parseFloat(document.getElementById('nc-kyle-excluded')?.value)||0;
        const kirstenExcluded = parseFloat(document.getElementById('nc-kirsten-excluded')?.value)||0;
        if (!name) return;
        const md=getMonthData();
        if (!md.nextCardId) md.nextCardId=101;
        md.cards.push({id:md.nextCardId++, name, paidBy, totalAmount, kyleExcluded, kirstenExcluded});
        state.showAddCard=false; saveState(); render();
      }
    });
  });
}

// ─── Header controls ──────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab=e.target.closest('[data-tab]');
  if (!tab) return;
  state.activeTab=tab.dataset.tab;
  state.editingBill=null; state.editingCard=null; state.editingPersonalCard=null;
  state.showAddBill=false; state.showAddCard=false; state.showAddPersonalCard=false;
  state.showAddFamilyCard=false;
  render();
});

document.getElementById('prev-month').addEventListener('click', () => {
  state.viewMonth--;
  if (state.viewMonth<0){state.viewMonth=11;state.viewYear--;}
  state.editingCard=null; state.showAddCard=false;
  render();
});
document.getElementById('next-month').addEventListener('click', () => {
  state.viewMonth++;
  if (state.viewMonth>11){state.viewMonth=0;state.viewYear++;}
  state.editingCard=null; state.showAddCard=false;
  render();
});
document.getElementById('go-today').addEventListener('click', () => {
  const now=new Date();
  state.viewYear=now.getFullYear(); state.viewMonth=now.getMonth();
  render();
});


// ─── Desktop grid helpers ─────────────────────────────────────────────────────
function applyFamilyDesktopGrid() {
  const el = document.getElementById('content');
  if (!el) return;

  // Find the Settlement section divider to split there
  const dividers = el.querySelectorAll('.section-divider');
  let settleDivider = null;
  dividers.forEach(d => {
    if (d.textContent.includes('Settlement')) settleDivider = d;
  });
  if (!settleDivider) return;

  // Collect everything from Settlement divider onwards into the right col
  const rightNodes = [];
  let node = settleDivider;
  while (node) {
    const next = node.nextSibling;
    rightNodes.push(node);
    node = next;
  }

  // Collect everything before Settlement divider into the left col
  const leftNodes = [];
  let lnode = el.firstChild;
  while (lnode && lnode !== settleDivider) {
    const next = lnode.nextSibling;
    leftNodes.push(lnode);
    lnode = next;
  }

  // Build the grid
  const grid     = document.createElement('div');
  grid.id        = 'family-split-grid';
  const leftCol  = document.createElement('div');
  leftCol.id     = 'family-bills-col';
  const rightCol = document.createElement('div');
  rightCol.id    = 'family-settle-col';

  leftNodes.forEach(n  => leftCol.appendChild(n));
  rightNodes.forEach(n => rightCol.appendChild(n));
  grid.appendChild(leftCol);
  grid.appendChild(rightCol);
  el.appendChild(grid);
}

function applyInsightsDesktopGrid() {
  const el = document.getElementById('content');
  if (!el) return;

  // Wrap pie chart and line chart side by side
  const pieWrap  = el.querySelector('.chart-wrap');
  const lineWrap = el.querySelector('.line-chart-wrap');
  if (!pieWrap || !lineWrap) return;

  const grid = document.createElement('div');
  grid.id = 'insights-top-grid';
  pieWrap.parentNode.insertBefore(grid, pieWrap);
  grid.appendChild(pieWrap);
  grid.appendChild(lineWrap);
}

function applyPersonalDesktopGrid() {
  const el = document.getElementById('content');
  if (!el) return;

  // Wrap personal card rows in a 2-col grid
  const gcard = el.querySelector('.g-card');
  if (!gcard) return;
  const grid = document.createElement('div');
  grid.id = 'personal-cards-grid';
  // Move the g-card's inner rows into individual cards per row
  // Actually just wrap the whole g-card - let CSS handle it via children display
  // Simpler: just set the g-card children to display as a grid
  gcard.style.display = 'grid';
  gcard.style.gridTemplateColumns = '1fr 1fr';
  gcard.style.overflow = 'hidden';
  gcard.style.borderRadius = '16px';
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadState();
render();

// ─── Header direct event wiring (outside #content, can't use attachEvents) ─────

// Household title tap-to-edit
document.getElementById('household-name-display').addEventListener('click', function() {
  const inp = document.getElementById('household-name-input');
  inp.value = state.householdName;
  this.style.display = 'none';
  inp.style.display = 'inline-block';
  inp.focus(); inp.select();
});
document.getElementById('household-name-input').addEventListener('blur', function() {
  const val = this.value.trim();
  if (val) state.householdName = val;
  this.style.display = 'none';
  const d = document.getElementById('household-name-display');
  d.textContent = state.householdName; d.style.display = 'inline-block';
  document.title = state.householdName + ' · Budget';
  const ssEl = document.getElementById('sidebar-status');
  if (ssEl) ssEl.innerHTML = 'System status: <span>● Online</span>';
  saveState();
});
document.getElementById('household-name-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter')  { e.preventDefault(); this.blur(); }
  if (e.key === 'Escape') { this.style.display='none'; document.getElementById('household-name-display').style.display='inline-block'; }
});

// Person avatar tap-to-edit popup
let editingPerson = null;

function openPersonEdit(personKey) {
  editingPerson = personKey;
  const person  = personKey === 'kyle' ? state.person1 : state.person2;
  const color   = personKey === 'kyle' ? '#f97316' : '#c026d3';
  const popup   = document.getElementById('person-edit-popup');
  const label   = document.getElementById('person-edit-label');
  const avatar  = document.getElementById('person-edit-avatar');
  const input   = document.getElementById('person-edit-input');
  const saveBtn = document.getElementById('person-edit-save');

  label.textContent  = `Rename ${person.name}`;
  avatar.textContent = person.initial;
  avatar.style.background = personKey === 'kyle' ? 'var(--kyle-bg)' : 'var(--kirs-bg)';
  avatar.style.color       = color;
  avatar.style.border      = `1px solid ${color}44`;
  input.value = person.name;
  input.style.borderColor = color;
  input.style.setProperty('--focus-color', color);
  saveBtn.style.background = color;

  popup.style.display = 'block';
  input.focus(); input.select();
}

function closePersonEdit(save) {
  if (save) {
    const inp = document.getElementById('person-edit-input');
    const val = inp.value.trim();
    if (val && editingPerson) {
      if (editingPerson === 'kyle') {
        state.person1.name    = val;
        state.person1.initial = val.charAt(0).toUpperCase();
      } else {
        state.person2.name    = val;
        state.person2.initial = val.charAt(0).toUpperCase();
      }
      saveState();
      render(); // re-render everything with new names
    }
  }
  document.getElementById('person-edit-popup').style.display = 'none';
  editingPerson = null;
}

document.getElementById('avatar-kyle').addEventListener('click', () => openPersonEdit('kyle'));
document.getElementById('avatar-kirs').addEventListener('click', () => openPersonEdit('kirsten'));
document.getElementById('person-edit-save').addEventListener('click', () => closePersonEdit(true));
document.getElementById('person-edit-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter')  { e.preventDefault(); closePersonEdit(true); }
  if (e.key === 'Escape') closePersonEdit(false);
});

// Close popup when clicking outside
document.addEventListener('click', function(e) {
  const popup = document.getElementById('person-edit-popup');
  if (popup.style.display === 'none') return;
  const inside = popup.contains(e.target)
    || e.target.id === 'avatar-kyle'
    || e.target.id === 'avatar-kirs';
  if (!inside) closePersonEdit(false);
});
</script>
