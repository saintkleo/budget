<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Kyle & Kirsten · Budget</title>
<style>
:root {
  --kyle:    #3b82f6;
  --kyle-bg: #1a2d4a;
  --kirs:    #ec4899;
  --kirs-bg: #3d1a2e;
  --green:   #10b981;
  --bg:      #0a0f1e;
  --surface: #111827;
  --card:    #1a2236;
  --border:  #1e2d45;
  --border2: #243352;
  --text:    #f0f4ff;
  --muted:   #64748b;
  --sub:     #94a3b8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,sans-serif;max-width:600px;margin:0 auto;min-height:100vh}
input,select,button{font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{display:none}

/* ── Header ── */
#header{
  background:linear-gradient(180deg,#151f35 0%,#111827 100%);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,16px) 16px 0;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
#header-top{display:flex;justify-content:space-between;align-items:center;padding-top:6px;margin-bottom:14px}
.header-names{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0}
.avatar-kyle{background:var(--kyle-bg);color:var(--kyle);border:1.5px solid var(--kyle)44}
.avatar-kirs{background:var(--kirs-bg);color:var(--kirs);border:1.5px solid var(--kirs)44}
.avatar-amp{font-size:12px;color:var(--muted);font-weight:400}
.header-total-wrap{text-align:right}
.header-total-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
#header-total-value{font-size:24px;font-weight:800;font-family:monospace;color:var(--text);letter-spacing:-.02em}
#month-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.month-nav{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;line-height:1}
.month-nav:active{color:var(--text)}
#month-label{font-size:13px;font-weight:600;color:var(--sub);flex:1;text-align:center;letter-spacing:.02em}
.month-reset{font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border2);border-radius:6px;padding:3px 8px;cursor:pointer}
#tabs{display:flex;gap:2px}
.tab{flex:1;padding:10px 2px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.02em;transition:all .15s}
.tab.active{color:var(--text);border-bottom-color:var(--kyle)}

/* ── Content ── */
#content{padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,16px)+24px)}

/* ── Glass card ── */
.g-card{background:var(--card);border-radius:14px;border:1px solid var(--border2);overflow:hidden;margin-bottom:12px;box-shadow:0 4px 24px #00000033}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border-radius:12px;padding:13px 14px;border:1px solid var(--border2);box-shadow:0 2px 12px #00000022}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:4px}
.stat-value{font-size:19px;font-weight:800;font-family:monospace;letter-spacing:-.01em}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Pill ── */
.pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.03em}
.pill-kyle{background:var(--kyle-bg);color:var(--kyle);border:1px solid var(--kyle)33}
.pill-kirs{background:var(--kirs-bg);color:var(--kirs);border:1px solid var(--kirs)33}

/* ── Category group ── */
.cat-header{display:flex;align-items:center;gap:7px;margin:14px 0 6px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.cat-total{margin-left:auto;font-size:11px;color:var(--sub);font-family:monospace;font-weight:600}

/* ── Bill row ── */
.bill-row{display:flex;align-items:center;gap:10px;padding:13px 14px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.bill-row:first-child{border-top:none}
.bill-row:active{background:#ffffff08}
.bill-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.bill-note{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-amount{font-size:15px;font-weight:700;font-family:monospace;color:var(--text);text-align:right}
.bill-freq-badge{font-size:9px;background:#1e3a4c;color:#38bdf8;border-radius:4px;padding:1px 5px;font-weight:700;letter-spacing:.04em}
.chevron{color:var(--border2);font-size:18px;flex-shrink:0}

/* ── Forms ── */
.edit-form{padding:13px;display:flex;flex-direction:column;gap:9px;border-top:1px solid var(--border);background:#0d1525}
.edit-form:first-child{border-top:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inp{background:#0a0f1e;border:1px solid var(--border2);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;width:100%;transition:border-color .15s}
.inp:focus{border-color:var(--kyle)}
.inp::placeholder{color:#334155}
.field-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.btn-row{display:flex;gap:8px;margin-top:2px}
.btn-primary{background:var(--kyle);border:none;border-radius:9px;padding:11px 18px;color:#fff;font-weight:700;font-size:14px;cursor:pointer;flex:1;letter-spacing:.01em;box-shadow:0 2px 12px #3b82f644}
.btn-primary:active{opacity:.85}
.btn-secondary{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:11px 18px;color:var(--sub);font-size:14px;cursor:pointer;flex:1}
.btn-danger{background:#1a0d0d;border:1px solid #7f1d1d;border-radius:9px;padding:11px 18px;color:#f87171;font-size:14px;cursor:pointer;flex:1}
.add-btn{width:100%;background:var(--card);border:1.5px dashed var(--border2);border-radius:12px;padding:14px;color:var(--muted);font-size:13px;cursor:pointer;font-weight:600;margin-top:10px;transition:all .15s}
.add-btn:active{border-color:var(--kyle);color:var(--kyle)}
.add-form{background:var(--card);border-radius:14px;border:1px solid var(--border2);padding:14px;margin-top:10px;display:flex;flex-direction:column;gap:9px;box-shadow:0 4px 24px #00000033}
.add-form-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}

/* ── Credit cards ── */
.cc-hdr{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.cc-name{font-size:14px;font-weight:700;color:var(--text);margin-left:8px}
.cc-grid{display:grid;grid-template-columns:1fr 1fr}
.cc-cell{padding:11px 14px}
.cc-cell+.cc-cell{border-left:1px solid var(--border)}
.cc-cell-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.cc-cell-val{font-size:19px;font-weight:800;font-family:monospace}
.cc-footer{padding:8px 14px;background:#00000022;display:flex;justify-content:space-between;align-items:center}
.cc-total{font-size:11px;color:var(--muted)}
.cc-owed{font-size:11px;color:var(--green);font-weight:700}

/* ── Settlement ── */
.transfer-hero{border-radius:16px;padding:26px 20px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.transfer-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,#ffffff08,transparent 70%);pointer-events:none}
.transfer-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);font-weight:700;margin-bottom:8px}
.transfer-amount{font-size:48px;font-weight:900;font-family:monospace;letter-spacing:-.03em;margin-bottom:8px;line-height:1}
.transfer-dir{font-size:14px;color:var(--sub);display:flex;align-items:center;justify-content:center;gap:8px}
.transfer-arrow{font-size:18px}
.breakdown-card{background:var(--card);border-radius:14px;border:1px solid var(--border2);overflow:hidden;margin-bottom:12px}
.breakdown-hd{padding:12px 16px;border-bottom:1px solid var(--border);background:#00000022;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#ffffff06}
.sec-hd-lbl{font-size:12px;font-weight:700}
.sec-hd-val{font-size:13px;font-family:monospace;font-weight:700}
.brow{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f172a22;padding:7px 16px}
.brow.indent{padding-left:28px}
.brow-lbl{font-size:13px;color:var(--sub)}
.brow.indent .brow-lbl{font-size:12px;color:var(--muted)}
.brow-note{font-size:10px;color:var(--muted);margin-left:5px}
.brow-val{font-size:13px;font-family:monospace;color:var(--sub)}
.brow.indent .brow-val{font-size:12px;color:var(--muted)}
.brow-val.hi{font-weight:700}
.div-line{height:1px;background:var(--border)}
.net-row{padding:14px 16px;background:#ffffff06}
.net-top{display:flex;justify-content:space-between;align-items:center}
.net-lbl{font-size:13px;font-weight:700;color:var(--text)}
.net-val{font-size:20px;font-weight:900;font-family:monospace;color:var(--green)}
.net-sub{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}

/* ── Pie chart ── */
.chart-wrap{background:var(--card);border-radius:14px;border:1px solid var(--border2);padding:18px 16px;margin-bottom:12px;box-shadow:0 4px 24px #00000033}
.chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:16px}
.chart-inner{display:flex;align-items:center;gap:16px}
#pie-svg{flex-shrink:0}
.chart-legend{flex:1;display:flex;flex-direction:column;gap:7px;min-width:0}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:12px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-pct{font-size:12px;font-family:monospace;font-weight:700;color:var(--text);flex-shrink:0}

/* ── Month history ── */
.hist-card{background:var(--card);border-radius:14px;border:1px solid var(--border2);overflow:hidden;margin-bottom:12px}
.hist-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--border);cursor:pointer}
.hist-row:first-child{border-top:none}
.hist-month{font-size:13px;font-weight:600;color:var(--text);flex:1}
.hist-total{font-size:13px;font-family:monospace;font-weight:700;color:var(--sub)}
.hist-transfer{font-size:12px;font-family:monospace;font-weight:700}

/* ── Water ── */
.water-card{background:#0c1f16;border:1px solid #14532d55;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.water-title{font-size:10px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.water-sub{font-size:12px;color:var(--muted);margin-bottom:10px}
.water-row{display:flex;gap:8px;align-items:center}
.water-avg{font-size:12px;color:var(--muted)}

/* ── Month-saved badge ── */
.save-toast{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+24px);left:50%;transform:translateX(-50%);background:#10b98122;border:1px solid var(--green);color:var(--green);font-size:12px;font-weight:700;padding:8px 18px;border-radius:30px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999}
.save-toast.show{opacity:1}

.hint{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:14px}
/* ── Personal cards ── */
.section-divider{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.section-divider-line{flex:1;height:1px;background:var(--border)}
.section-divider-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);white-space:nowrap}
.personal-card-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid var(--border);cursor:pointer;transition:background .1s}
.personal-card-row:first-child{border-top:none}
.personal-card-row:active{background:#ffffff08}
/* ── Income section ── */
.income-card{background:var(--card);border-radius:14px;border:1px solid var(--border2);padding:16px;margin-bottom:12px;box-shadow:0 4px 24px #00000033}
.income-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.income-row:last-child{margin-bottom:0}
.income-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.income-label{font-size:13px;color:var(--sub);flex:1}
.income-inp{background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;color:var(--text);font-size:15px;font-family:monospace;font-weight:700;width:150px;text-align:right}
.income-inp:focus{border-color:var(--kyle);outline:none}
.income-inp::placeholder{color:#334155;font-weight:400}

/* ── View toggle ── */
.view-toggle{display:flex;background:var(--bg);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-bottom:14px}
.view-toggle-btn{flex:1;padding:9px 6px;border:none;background:transparent;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.03em;transition:all .15s}
.view-toggle-btn.active{background:var(--kyle);color:#fff}

/* ── Line chart ── */
.line-chart-wrap{background:var(--card);border-radius:14px;border:1px solid var(--border2);padding:16px;margin-bottom:12px;box-shadow:0 4px 24px #00000033;overflow:hidden}
.line-chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:4px}
.line-chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
#line-svg{width:100%;overflow:visible}
.line-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.line-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.line-legend-dot{width:20px;height:3px;border-radius:2px;flex-shrink:0}

/* ── Surplus/deficit bars ── */
.surplus-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.surplus-name{font-size:12px;color:var(--sub);width:54px;flex-shrink:0}
.surplus-bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;position:relative}
.surplus-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.surplus-val{font-size:11px;font-family:monospace;font-weight:700;min-width:70px;text-align:right}

</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div class="header-names">
      <div class="avatar avatar-kyle">K</div>
      <span class="avatar-amp">&amp;</span>
      <div class="avatar avatar-kirs">K</div>
    </div>
    <div class="header-total-wrap">
      <div class="header-total-label">Monthly Total</div>
      <div id="header-total-value">—</div>
    </div>
  </div>
  <div id="month-bar">
    <button class="month-nav" id="prev-month">‹</button>
    <span id="month-label">—</span>
    <button class="month-nav" id="next-month">›</button>
    <button class="month-reset" id="go-today">Today</button>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="family">🏠 Family Split</button>
    <button class="tab" data-tab="personal">👤 Personal</button>
    <button class="tab" data-tab="insights">📊 Budget</button>
  </div>
</div>

<div id="content"></div>
<div class="save-toast" id="toast">Saved ✓</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
const KYLE  = '#3b82f6';
const KIRS  = '#ec4899';
const GREEN = '#10b981';

const CAT_COLORS = {
  housing:'#6366f1', utilities:'#0ea5e9', insurance:'#10b981',
  auto:'#f59e0b', subscriptions:'#a855f7', credit:'#ec4899', other:'#64748b'
};
const CATS = ['housing','utilities','insurance','auto','subscriptions','other'];

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

const STORAGE_KEY = 'kk-budget-v2';

// ─── Default bills (fixed recurring) ─────────────────────────────────────────
const DEFAULT_BILLS = [
  {id:1, name:'Xcel Energy',  amount:158,  frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:2, name:'Quantum',      amount:80,   frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:3, name:'Water',        amount:0,    frequency:'quarterly', paidBy:'kyle',    category:'utilities', note:''},
  {id:4, name:'State Farm',   amount:225,  frequency:'monthly',   paidBy:'kyle',    category:'insurance', note:''},
  {id:5, name:'Natural Gas',  amount:60,   frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:6, name:'Mortgage',     amount:1750, frequency:'monthly',   paidBy:'kirsten', category:'housing',   note:''},
  {id:7, name:'Car Payment',  amount:670,  frequency:'monthly',   paidBy:'kirsten', category:'auto',      note:''},
];

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  activeTab: 'family',
  editingBill: null,
  editingCard: null,
  showAddBill: false,
  showAddCard: false,
  editingPersonalCard: null,
  showAddPersonalCard: false,
  insightsView: 'combined',
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  bills: DEFAULT_BILLS,
  nextBillId: 8,
  // monthData: { "YYYY-MM": { cards: [...], notes: "" } }
  monthData: {
    // Seed current month with default cards so they're ready to use
  },
};

// Helper: get resolved amounts for any card regardless of mode
function cardDisplayAmounts(card) {
  const mode = card.splitMode || 'charges';
  if (mode === 'half') {
    const total = parseFloat(card.totalAmount)||0;
    return { ka: total/2, kia: total/2, total, owedByOther: total/2, otherName: card.paidBy==='kyle'?'Kirsten':'Kyle' };
  }
  const ka  = parseFloat(card.kyleAmount)||0;
  const kia = parseFloat(card.kirstenAmount)||0;
  return { ka, kia, total: ka+kia, owedByOther: card.paidBy==='kyle'?kia:ka, otherName: card.paidBy==='kyle'?'Kirsten':'Kyle' };
}


// ─── Income helpers ───────────────────────────────────────────────────────────
function getIncome(key) {
  const md = state.monthData[key];
  return {
    kyle:    parseFloat(md?.kyleIncome)    || 0,
    kirsten: parseFloat(md?.kirstenIncome) || 0,
  };
}

function setIncome(key, who, val) {
  if (!state.monthData[key]) state.monthData[key] = {};
  if (!state.monthData[key].nextCardId) state.monthData[key].nextCardId = 101;
  if (!state.monthData[key].cards)      state.monthData[key].cards      = [];
  state.monthData[key][who === 'kyle' ? 'kyleIncome' : 'kirstenIncome'] = val;
}

// Build a sorted list of up to N months for charting
function getChartMonths(n) {
  const now = new Date();
  const months = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const yr = d.getFullYear(), mo = d.getMonth();
    const key = `${yr}-${String(mo+1).padStart(2,'0')}`;
    months.push({ key, yr, mo, label: MONTHS[mo].slice(0,3) + ' ' + String(yr).slice(2) });
  }
  return months;
}

// Compute per-person spending for a given month key
function getSpending(key) {
  const origY = state.viewYear, origM = state.viewMonth;
  const [yr, mo] = key.split('-').map(Number);
  state.viewYear = yr; state.viewMonth = mo - 1;
  const s = calcSettlement();
  state.viewYear = origY; state.viewMonth = origM;

  // Kyle's spending: his bills + his card charges + his personal cards
  const mdSnap = state.monthData[key] || {};
  const pCards = mdSnap.personalCards || [];
  const kylePersonal    = pCards.filter(c=>c.owner==='kyle').reduce((a,c)=>a+(parseFloat(c.amount)||0),0);
  const kirstenPersonal = pCards.filter(c=>c.owner==='kirsten').reduce((a,c)=>a+(parseFloat(c.amount)||0),0);

  const kyleSpend = s.kyleBillsTotal + s.cards.reduce((a,c) => {
    const { ka } = cardDisplayAmounts(c);
    return a + ka;
  }, 0) + kylePersonal;
  // Kirsten's spending: her bills + her card charges + her personal cards
  const kirstenSpend = s.kirstenBillsTotal + s.cards.reduce((a,c) => {
    const { kia } = cardDisplayAmounts(c);
    return a + kia;
  }, 0) + kirstenPersonal;

  return { kyle: kyleSpend, kirsten: kirstenSpend, total: s.grandTotal };
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return;
    const p = JSON.parse(s);
    if (p.bills)       state.bills       = p.bills;
    if (p.nextBillId)  state.nextBillId  = p.nextBillId;
    if (p.monthData)   state.monthData   = p.monthData;
    if (p.insightsView) state.insightsView = p.insightsView;
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      bills:       state.bills,
      nextBillId:  state.nextBillId,
      monthData:   state.monthData,
      insightsView: state.insightsView,
    }));
    showToast();
  } catch(e) {}
}

let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

// ─── Month key ────────────────────────────────────────────────────────────────
function monthKey() {
  return `${state.viewYear}-${String(state.viewMonth+1).padStart(2,'0')}`;
}

function getMonthData() {
  const k = monthKey();
  if (!state.monthData[k]) state.monthData[k] = { cards: [] };
  if (!state.monthData[k].nextCardId)     state.monthData[k].nextCardId     = 101;
  if (!state.monthData[k].cards)          state.monthData[k].cards          = [];
  if (!state.monthData[k].personalCards)  state.monthData[k].personalCards  = [];
  if (!state.monthData[k].nextPersonalId) state.monthData[k].nextPersonalId = 201;
  return state.monthData[k];
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n||0);
const toMonthly = (a,f) => f==='quarterly' ? a/3 : f==='annual' ? a/12 : Number(a)||0;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function pill(who) {
  const cls   = who==='kyle' ? 'pill-kyle' : 'pill-kirs';
  const label = who==='kyle' ? 'Kyle' : 'Kirsten';
  return `<span class="pill ${cls}">${label}</span>`;
}

// ─── Settlement calc ──────────────────────────────────────────────────────────
function calcSettlement() {
  const md = getMonthData();
  const cards = md.cards || [];

  const processed = state.bills.map(b => ({...b, monthly: toMonthly(b.amount, b.frequency)}));
  const kyleBills    = processed.filter(b => b.paidBy==='kyle');
  const kirstenBills = processed.filter(b => b.paidBy==='kirsten');
  const kyleBillsTotal    = kyleBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenBillsTotal = kirstenBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenOwesBillShare = kyleBillsTotal / 2;
  const kyleOwesBillShare    = kirstenBillsTotal / 2;

  let cardKyleOwes=0, cardKirstenOwes=0;
  cards.forEach(c => {
    const mode = c.splitMode || 'charges';
    if (mode === 'half') {
      const total = parseFloat(c.totalAmount)||0;
      const half  = total / 2;
      if (c.paidBy==='kyle') cardKirstenOwes += half;
      else                    cardKyleOwes    += half;
    } else {
      const ka=parseFloat(c.kyleAmount)||0, kia=parseFloat(c.kirstenAmount)||0;
      if (c.paidBy==='kyle') cardKirstenOwes+=kia; else cardKyleOwes+=ka;
    }
  });
  const cardsTotalMonthly = cards.reduce((s,c) => {
    const mode = c.splitMode || 'charges';
    if (mode==='half') return s + (parseFloat(c.totalAmount)||0);
    return s + (parseFloat(c.kyleAmount)||0) + (parseFloat(c.kirstenAmount)||0);
  }, 0);
  const billNet  = kyleOwesBillShare - kirstenOwesBillShare;
  const cardNet  = cardKyleOwes - cardKirstenOwes;
  const netTransfer = billNet + cardNet;
  const grandTotal = kyleBillsTotal + kirstenBillsTotal + cardsTotalMonthly;

  return {
    grandTotal, kyleBillsTotal, kirstenBillsTotal, processed,
    kyleBills, kirstenBills, kirstenOwesBillShare, kyleOwesBillShare,
    cardKyleOwes, cardKirstenOwes, billNet, cardNet, netTransfer,
    cardsTotalMonthly, cards,
  };
}

// ─── Pie chart ────────────────────────────────────────────────────────────────
function renderPie(s) {
  // Build category totals (bills + credit cards as their own category)
  const catTotals = {};
  s.processed.forEach(b => {
    const c = b.category||'other';
    catTotals[c] = (catTotals[c]||0) + b.monthly;
  });
  if (s.cardsTotalMonthly > 0) catTotals['credit'] = (catTotals['credit']||0) + s.cardsTotalMonthly;

  const entries = Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const total = entries.reduce((s,[,v])=>s+v,0);
  if (!total) return '';

  // SVG donut
  const R=70, r=42, cx=80, cy=80;
  let startAngle = -Math.PI/2;
  let slices = '';

  entries.forEach(([cat, val]) => {
    const angle = (val/total) * Math.PI * 2;
    const endAngle = startAngle + angle;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(endAngle),   y2=cy+R*Math.sin(endAngle);
    const ix1=cx+r*Math.cos(startAngle),iy1=cy+r*Math.sin(startAngle);
    const ix2=cx+r*Math.cos(endAngle),  iy2=cy+r*Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    const color = CAT_COLORS[cat]||'#64748b';
    slices += `<path d="M${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${r},${r} 0 ${large},0 ${ix1},${iy1} Z"
      fill="${color}" opacity="0.92" stroke="var(--card)" stroke-width="2"/>`;
    startAngle = endAngle;
  });

  const legend = entries.map(([cat,val]) =>
    `<div class="legend-item">
      <div class="legend-dot" style="background:${CAT_COLORS[cat]||'#64748b'}"></div>
      <span class="legend-name">${cat}</span>
      <span class="legend-pct">${Math.round(val/total*100)}%</span>
    </div>`).join('');

  return `<div class="chart-wrap">
    <div class="chart-title">Spending Breakdown</div>
    <div class="chart-inner">
      <svg id="pie-svg" width="160" height="160" viewBox="0 0 160 160">
        ${slices}
        <circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--card)"/>
        <text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="11" fill="var(--muted)" font-family="-apple-system,sans-serif">Total</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="13" fill="var(--text)" font-weight="800" font-family="monospace">${fmt(total).replace('.00','')}</text>
      </svg>
      <div class="chart-legend">${legend}</div>
    </div>
  </div>`;
}

  // ── Settlement section ────────────────────────────────────────────────────
  const nt = s.netTransfer;
  const transferBg  = nt>0?'linear-gradient(135deg,#0c1f35,#0a0f1e)':nt<0?'linear-gradient(135deg,#1a0d20,#0a0f1e)':'linear-gradient(135deg,#0a1f14,#0a0f1e)';
  const borderColor = nt>0?KYLE:nt<0?KIRS:GREEN;
  const amountColor = nt>0?KYLE:nt<0?KIRS:GREEN;
  const dirHtml     = nt>0
    ? `<span style="color:${KYLE};font-weight:700">Kyle</span><span class="transfer-arrow">→</span><span style="color:${KIRS};font-weight:700">Kirsten</span>`
    : nt<0
    ? `<span style="color:${KIRS};font-weight:700">Kirsten</span><span class="transfer-arrow">→</span><span style="color:${KYLE};font-weight:700">Kyle</span>`
    : `<span style="color:${GREEN}">Perfectly balanced ✓</span>`;

  html += `<div class="section-divider">
    <div class="section-divider-line"></div>
    <span class="section-divider-label">⚖️ Settlement · ${MONTHS[state.viewMonth]}</span>
    <div class="section-divider-line"></div>
  </div>`;

  html += `<div class="transfer-hero" style="background:${transferBg};border:1px solid ${borderColor}44">
    <div class="transfer-eyebrow">${MONTHS[state.viewMonth]} Transfer</div>
    <div class="transfer-amount" style="color:${amountColor}">${fmt(Math.abs(nt))}</div>
    <div class="transfer-dir">${dirHtml}</div>
  </div>`;

  // Breakdown
  const brow = (lbl,val,indent,color,note) =>
    `<div class="brow${indent?' indent':''}">
      <div><span class="brow-lbl">${esc(lbl)}</span>${note?`<span class="brow-note">(${esc(note)})</span>`:''}</div>
      <span class="brow-val${color?' hi':''}" style="${color?`color:${color}`:''}>${esc(val)}</span>
    </div>`;
  const secHd = (lbl,val,color) =>
    `<div class="sec-hd"><span class="sec-hd-lbl" style="color:${color}">${esc(lbl)}</span><span class="sec-hd-val" style="color:${color}">${esc(val)}</span></div>`;

  let bd = '';
  bd += secHd('Bills Kyle pays', fmt(s.kyleBillsTotal), KYLE);
  s.kyleBills.forEach(b => { bd += brow(b.name, fmt(b.monthly)+'/mo', true); });
  bd += brow("Kirsten's half", fmt(s.kirstenOwesBillShare), false, '#f87171', 'Kirsten owes Kyle');
  bd += '<div class="div-line"></div>';
  bd += secHd('Bills Kirsten pays', fmt(s.kirstenBillsTotal), KIRS);
  s.kirstenBills.forEach(b => { bd += brow(b.name, fmt(b.monthly)+'/mo', true); });
  bd += brow("Kyle's half", fmt(s.kyleOwesBillShare), false, GREEN, 'Kyle owes Kirsten');

  if (s.cardsTotalMonthly > 0) {
    bd += '<div class="div-line"></div>';
    bd += secHd('Shared cards', fmt(s.cardsTotalMonthly), '#a855f7');
    s.cards.forEach(c => {
      const mode = c.splitMode || 'charges';
      let owe, who;
      if (mode === 'half') {
        const total = parseFloat(c.totalAmount)||0; owe = total/2; who = c.paidBy==='kyle'?'Kirsten':'Kyle';
      } else {
        const ka=parseFloat(c.kyleAmount)||0, kia=parseFloat(c.kirstenAmount)||0;
        owe = c.paidBy==='kyle'?kia:ka; who = c.paidBy==='kyle'?'Kirsten':'Kyle';
      }
      const modeLabel = mode==='half'?'50/50 split':`${who}'s charges`;
      if (owe>0) bd += brow(c.name, fmt(owe), true, null, `${who} owes · ${modeLabel}`);
    });
    if (s.cardKyleOwes>0)    bd += brow('Kyle owes (cards)',    fmt(s.cardKyleOwes),    false, GREEN);
    if (s.cardKirstenOwes>0) bd += brow('Kirsten owes (cards)', fmt(s.cardKirstenOwes), false, '#f87171');
  }

  bd += '<div class="div-line"></div>';
  bd += `<div class="net-row">
    <div class="net-top">
      <span class="net-lbl">${nt>=0?'Kyle sends Kirsten':'Kirsten sends Kyle'}</span>
      <span class="net-val">${fmt(Math.abs(nt))}</span>
    </div>
    <div class="net-sub">
      Bills: ${fmt(Math.abs(s.billNet))} ${s.billNet>=0?'(Kyle→Kirsten)':'(Kirsten→Kyle)'}
      ${s.cardsTotalMonthly>0?` · Cards: ${fmt(Math.abs(s.cardNet))}`:''}
    </div>
  </div>`;

  html += `<div class="breakdown-card"><div class="breakdown-hd">How It's Calculated</div>${bd}</div>`;

  // Water input
  const waterBill = state.bills.find(b=>b.name==='Water');
  const waterAmt  = parseFloat(waterBill?.amount)||0;
  html += `<div class="water-card">
    <div class="water-title">💧 Water Bill (Quarterly)</div>
    <div class="water-sub">Enter the quarterly total — averaged monthly.</div>
    <div class="water-row">
      <input class="inp" id="water-input" type="number" inputmode="decimal" placeholder="e.g. 90" value="${waterAmt||''}" style="width:110px;font-family:monospace;color:#4ade80"/>
      <span class="water-avg" id="water-avg">= ${fmt(waterAmt/3)}/mo</span>
    </div>
  </div>`;

  return html;
}

// ─── Insights Tab ─────────────────────────────────────────────────────────────
function renderInsights(s) {
  const curKey  = monthKey();
  const income  = getIncome(curKey);
  const spend   = getSpending(curKey);
  const view    = state.insightsView; // 'combined' | 'kyle' | 'kirsten'

  // ── Income input card ──────────────────────────────────────────────────────
  let html = `
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:8px">${MONTHS[state.viewMonth]} Income</div>
  <div class="income-card">
    <div class="income-row">
      <div class="income-avatar avatar-kyle">K</div>
      <span class="income-label">Kyle</span>
      <input class="income-inp" id="income-kyle" type="number" inputmode="decimal"
        placeholder="0.00" value="${income.kyle||''}"/>
    </div>
    <div class="income-row">
      <div class="income-avatar avatar-kirs">K</div>
      <span class="income-label">Kirsten</span>
      <input class="income-inp" id="income-kirsten" type="number" inputmode="decimal"
        placeholder="0.00" value="${income.kirsten||''}"/>
    </div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between">
      <span style="font-size:12px;color:var(--muted)">Combined income</span>
      <span style="font-size:16px;font-weight:800;font-family:monospace;color:${GREEN}">${fmt(income.kyle + income.kirsten)}</span>
    </div>
  </div>`;

  // ── Surplus / deficit for current month ───────────────────────────────────
  const kyleSurplus    = income.kyle    - spend.kyle;
  const kirstenSurplus = income.kirsten - spend.kirsten;
  const combIncome     = income.kyle + income.kirsten;
  const combSpend      = spend.total;
  const combSurplus    = combIncome - combSpend;

  if (combIncome > 0 || combSpend > 0) {
    const maxVal = Math.max(combIncome, combSpend, income.kyle, spend.kyle, income.kirsten, spend.kirsten, 1);
    const bar = (val, color, maxV) => {
      const pct = Math.min(100, Math.round(val/maxV*100));
      return `<div class="surplus-bar-fill" style="width:${pct}%;background:${color}"></div>`;
    };
    html += `
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">${MONTHS[state.viewMonth]} Snapshot</div>
    <div class="income-card">`;

    if (view === 'combined' || view === 'kyle') {
      html += `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:${KYLE}">Kyle</span>
          <span style="font-size:11px;color:${kyleSurplus>=0?GREEN:'#f87171'};font-weight:700">
            ${kyleSurplus>=0?'+':''}${fmt(kyleSurplus)}
          </span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${GREEN}">Income</span>
          <div class="surplus-bar-track">${bar(income.kyle, GREEN, maxVal)}</div>
          <span class="surplus-val" style="color:${GREEN}">${fmt(income.kyle)}</span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${KYLE}">Spending</span>
          <div class="surplus-bar-track">${bar(spend.kyle, KYLE, maxVal)}</div>
          <span class="surplus-val" style="color:${KYLE}">${fmt(spend.kyle)}</span>
        </div>
      </div>`;
    }
    if (view === 'combined') {
      html += `<div style="height:1px;background:var(--border);margin-bottom:12px"></div>`;
    }
    if (view === 'combined' || view === 'kirsten') {
      html += `<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
          <span style="font-size:11px;font-weight:700;color:${KIRS}">Kirsten</span>
          <span style="font-size:11px;color:${kirstenSurplus>=0?GREEN:'#f87171'};font-weight:700">
            ${kirstenSurplus>=0?'+':''}${fmt(kirstenSurplus)}
          </span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${GREEN}">Income</span>
          <div class="surplus-bar-track">${bar(income.kirsten, GREEN, maxVal)}</div>
          <span class="surplus-val" style="color:${GREEN}">${fmt(income.kirsten)}</span>
        </div>
        <div class="surplus-row">
          <span class="surplus-name" style="color:${KIRS}">Spending</span>
          <div class="surplus-bar-track">${bar(spend.kirsten, KIRS, maxVal)}</div>
          <span class="surplus-val" style="color:${KIRS}">${fmt(spend.kirsten)}</span>
        </div>
      </div>`;
    }
    if (view === 'combined') {
      html += `<div style="height:1px;background:var(--border);margin-bottom:12px"></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted)">Household surplus</span>
        <span style="font-size:18px;font-weight:800;font-family:monospace;color:${combSurplus>=0?GREEN:'#f87171'}">${combSurplus>=0?'+':''}${fmt(combSurplus)}</span>
      </div>`;
    }
    html += `</div>`;
  }

  // ── Line chart (Income vs Spending over time) ─────────────────────────────
  html += `
  <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Income vs Spending</div>
  <div class="view-toggle">
    <button class="view-toggle-btn${view==='combined'?' active':''}" data-action="insights-view" data-view="combined">Combined</button>
    <button class="view-toggle-btn${view==='kyle'?' active':''}" data-action="insights-view" data-view="kyle">Kyle</button>
    <button class="view-toggle-btn${view==='kirsten'?' active':''}" data-action="insights-view" data-view="kirsten">Kirsten</button>
  </div>`;
  html += renderLineChart(view);

  // ── Pie chart ─────────────────────────────────────────────────────────────
  html += `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Spending Breakdown</div>`;
  html += renderPie(s);

  // ── Month history table ────────────────────────────────────────────────────
  const histEntries = Object.keys(state.monthData)
    .sort((a,b) => b.localeCompare(a))
    .slice(0, 12);

  if (histEntries.length > 0) {
    html += `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:16px 0 8px">Month History</div>
    <div class="hist-card">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 14px;border-bottom:1px solid var(--border)">
        <span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em">Month</span>
        <span style="font-size:9px;font-weight:700;color:${GREEN};text-transform:uppercase;letter-spacing:.1em;text-align:right">Income</span>
        <span style="font-size:9px;font-weight:700;color:var(--kyle);text-transform:uppercase;letter-spacing:.1em;text-align:right">Spend</span>
        <span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;text-align:right">Net</span>
      </div>`;

    histEntries.forEach(key => {
      const [yr, mo] = key.split('-').map(Number);
      const mLabel = MONTHS[mo-1].slice(0,3) + ' ' + String(yr).slice(2);
      const inc = getIncome(key);
      const sp  = getSpending(key);

      let totalInc, totalSpend;
      if (view === 'kyle')    { totalInc = inc.kyle;    totalSpend = sp.kyle; }
      else if (view==='kirsten') { totalInc = inc.kirsten; totalSpend = sp.kirsten; }
      else                    { totalInc = inc.kyle + inc.kirsten; totalSpend = sp.total; }

      const net = totalInc - totalSpend;
      const netColor = net >= 0 ? GREEN : '#f87171';
      const hasData = totalInc > 0 || totalSpend > 0;
      html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:10px 14px;border-top:1px solid var(--border);${!hasData?'opacity:.4':''}">
        <span style="font-size:12px;font-weight:600;color:var(--text)">${mLabel}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:${GREEN};text-align:right">${totalInc>0?fmt(totalInc):'—'}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:var(--sub);text-align:right">${totalSpend>0?fmt(totalSpend):'—'}</span>
        <span style="font-size:12px;font-family:monospace;font-weight:700;color:${netColor};text-align:right">${totalInc>0||totalSpend>0?(net>=0?'+':'')+fmt(net):'—'}</span>
      </div>`;
    });
    html += '</div>';
  }

  return html;
}

// ─── Line Chart SVG ───────────────────────────────────────────────────────────
function renderLineChart(view) {
  const months = getChartMonths(6);
  const W = 520, H = 160, PAD = { top:16, right:12, bottom:32, left:56 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top  - PAD.bottom;

  // Gather data points
  const dataPoints = months.map(m => {
    const inc = getIncome(m.key);
    const sp  = getSpending(m.key);
    if (view === 'kyle')    return { incA: inc.kyle,    spA: sp.kyle,    label: m.label };
    if (view === 'kirsten') return { incA: inc.kirsten, spA: sp.kirsten, label: m.label };
    return { incA: inc.kyle + inc.kirsten, spA: sp.total, label: m.label };
  });

  const allVals = dataPoints.flatMap(d => [d.incA, d.spA]).filter(v => v > 0);
  const maxV = allVals.length ? Math.max(...allVals) * 1.15 : 5000;
  const minV = 0;
  const range = maxV - minV || 1;

  const toX = i  => PAD.left + (i / Math.max(dataPoints.length-1, 1)) * innerW;
  const toY = v  => PAD.top  + innerH - ((v - minV) / range) * innerH;

  const polyline = (pts, color, dash='') => {
    if (pts.every(p => p[1] === toY(0))) return ''; // all zero - skip
    const d = pts.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    return `<path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
  };
  const dots = (pts, color) => pts
    .filter(p => p[2] > 0)
    .map(p => `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="4" fill="${color}" stroke="var(--card)" stroke-width="2"/>`)
    .join('');

  const incPts  = dataPoints.map((d,i) => [toX(i), toY(d.incA), d.incA]);
  const spPts   = dataPoints.map((d,i) => [toX(i), toY(d.spA),  d.spA]);

  // Y axis ticks
  const ticks = 4;
  let yTicks = '';
  for (let t = 0; t <= ticks; t++) {
    const v = minV + (range / ticks) * t;
    const y = toY(v).toFixed(1);
    const label = v >= 1000 ? `$${(v/1000).toFixed(0)}k` : `$${Math.round(v)}`;
    yTicks += `<line x1="${PAD.left-4}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="var(--border)" stroke-width="1"/>`;
    yTicks += `<text x="${PAD.left-8}" y="${y}" text-anchor="end" dominant-baseline="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${label}</text>`;
  }

  // X axis labels
  let xLabels = '';
  dataPoints.forEach((d,i) => {
    xLabels += `<text x="${toX(i).toFixed(1)}" y="${(H - PAD.bottom + 14).toFixed(1)}" text-anchor="middle" font-size="9" fill="var(--muted)" font-family="-apple-system,sans-serif">${d.label}</text>`;
  });

  // Fill area under income line (subtle)
  const fillPts = [...incPts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`),
    `${toX(dataPoints.length-1).toFixed(1)},${toY(0).toFixed(1)}`,
    `${toX(0).toFixed(1)},${toY(0).toFixed(1)}`].join(' ');
  const incomeLine  = view==='kirsten' ? KIRS : KYLE;
  const spendLine   = view==='kyle' ? '#6366f1' : view==='kirsten' ? '#a855f7' : '#f59e0b';

  const noData = allVals.length === 0;

  // Legend
  const legendItems = view === 'combined'
    ? [{color:KYLE, label:'Combined Income', dash:''},{color:'#f59e0b', label:'Combined Spending', dash:'4,3'}]
    : view === 'kyle'
    ? [{color:KYLE, label:'Kyle Income', dash:''},{color:'#6366f1', label:'Kyle Spending', dash:'4,3'}]
    : [{color:KIRS, label:'Kirsten Income', dash:''},{color:'#a855f7', label:'Kirsten Spending', dash:'4,3'}];

  const legendHtml = legendItems.map(l =>
    `<div class="line-legend-item">
      <svg width="20" height="10"><line x1="0" y1="5" x2="20" y2="5" stroke="${l.color}" stroke-width="2.5" stroke-dasharray="${l.dash}" stroke-linecap="round"/></svg>
      ${esc(l.label)}
    </div>`).join('');

  return `<div class="line-chart-wrap">
    <div class="line-chart-title">Income vs Spending</div>
    <div class="line-chart-sub">Last 6 months · ${view==='combined'?'Household':view==='kyle'?'Kyle':'Kirsten'}</div>
    ${noData ? `<div style="text-align:center;padding:32px 0;color:var(--muted);font-size:13px">Enter income above to see your chart</div>` : `
    <svg id="line-svg" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
      ${yTicks}
      ${xLabels}
      <polygon points="${fillPts}" fill="${incomeLine}11"/>
      ${polyline(incPts, incomeLine)}
      ${polyline(spPts, spendLine, '4,3')}
      ${dots(incPts, incomeLine)}
      ${dots(spPts, spendLine)}
    </svg>`}
    <div class="line-legend">${legendHtml}</div>
  </div>`;
}

// ─── Events ───────────────────────────────────────────────────────────────────
function attachEvents() {
  const content = document.getElementById('content');

  // Live field edits
  content.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', () => {
      const id=parseInt(el.dataset.id), field=el.dataset.field, type=el.dataset.type;
      const value = el.type==='number'?(parseFloat(el.value)||0):el.value;
      if (type==='bill') {
        state.bills = state.bills.map(b=>b.id===id?{...b,[field]:value}:b);
      } else if (type==='pcard') {
        const md = getMonthData();
        md.personalCards = (md.personalCards||[]).map(c=>c.id===id?{...c,[field]:value}:c);
      } else {
        const md = getMonthData();
        md.cards = md.cards.map(c=>c.id===id?{...c,[field]:value}:c);
      }
      document.getElementById('header-total-value').textContent = fmt(calcSettlement().grandTotal);
    });
    el.addEventListener('change', () => {
      const id=parseInt(el.dataset.id), field=el.dataset.field, type=el.dataset.type;
      const value = el.type==='number'?(parseFloat(el.value)||0):el.value;
      if (type==='bill') {
        state.bills = state.bills.map(b=>b.id===id?{...b,[field]:value}:b);
      } else if (type==='pcard') {
        const md = getMonthData();
        md.personalCards = (md.personalCards||[]).map(c=>c.id===id?{...c,[field]:value}:c);
      } else {
        const md = getMonthData();
        md.cards = md.cards.map(c=>c.id===id?{...c,[field]:value}:c);
      }
      saveState(); render();
    });
  });

  // Water input
  const wi = document.getElementById('water-input');
  if (wi) {
    wi.addEventListener('input', () => {
      const val=parseFloat(wi.value)||0;
      state.bills = state.bills.map(b=>b.name==='Water'?{...b,amount:val}:b);
      const avg = document.getElementById('water-avg');
      if (avg) avg.textContent = `= ${fmt(val/3)}/mo`;
      document.getElementById('header-total-value').textContent = fmt(calcSettlement().grandTotal);
      saveState();
    });
  }

  // Income inputs — save silently on each keystroke, re-render only on blur
  ['kyle','kirsten'].forEach(who => {
    const inp = document.getElementById(`income-${who}`);
    if (!inp) return;
    // Save value on every keystroke without re-rendering (preserves focus & cursor)
    inp.addEventListener('input', () => {
      setIncome(monthKey(), who, parseFloat(inp.value)||0);
      saveState();
    });
    // Re-render the insights panel only after the user leaves the field
    inp.addEventListener('blur', () => {
      if (state.activeTab === 'insights') {
        const focusedId = inp.id; // remember which field just blurred
        const s = calcSettlement();
        document.getElementById('content').innerHTML = renderInsights(s);
        attachEvents();
        // Don't try to re-focus — user already left the field intentionally
      }
    });
  });

  // Action buttons
  content.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action=el.dataset.action, id=el.dataset.id?parseInt(el.dataset.id):null;

      if      (action==='edit-bill')           { state.editingBill=id; render(); }
      else if (action==='done-edit-bill')      { state.editingBill=null; saveState(); render(); }
      else if (action==='delete-bill')         { state.bills=state.bills.filter(b=>b.id!==id); state.editingBill=null; saveState(); render(); }
      else if (action==='edit-card')           { state.editingCard=id; render(); }
      else if (action==='done-edit-card')      { state.editingCard=null; saveState(); render(); }
      else if (action==='delete-card')         { const md=getMonthData(); md.cards=md.cards.filter(c=>c.id!==id); state.editingCard=null; saveState(); render(); }
      else if (action==='show-add-bill')       { state.showAddBill=true; render(); }
      else if (action==='cancel-add-bill')     { state.showAddBill=false; render(); }
      else if (action==='show-add-card')       { state.showAddCard=true; render(); }
      else if (action==='cancel-add-card')     { state.showAddCard=false; render(); }
      else if (action==='confirm-add-bill') {
        const name=document.getElementById('nb-name').value.trim();
        const amount=parseFloat(document.getElementById('nb-amount').value)||0;
        const freq=document.getElementById('nb-freq').value;
        const paidBy=document.getElementById('nb-payer').value;
        const cat=document.getElementById('nb-cat').value;
        const note=document.getElementById('nb-note').value.trim();
        if (!name) return;
        state.bills.push({id:state.nextBillId++,name,amount,frequency:freq,paidBy,category:cat,note});
        state.showAddBill=false; saveState(); render();
      }
      else if (action==='edit-pcard')         { state.editingPersonalCard=id; render(); }
      else if (action==='done-edit-pcard')    { state.editingPersonalCard=null; saveState(); render(); }
      else if (action==='delete-pcard')       {
        const md=getMonthData();
        md.personalCards=(md.personalCards||[]).filter(c=>c.id!==id);
        state.editingPersonalCard=null; saveState(); render();
      }
      else if (action==='show-add-pcard')     { state.showAddPersonalCard=true; render(); }
      else if (action==='cancel-add-pcard')   { state.showAddPersonalCard=false; render(); }
      else if (action==='confirm-add-pcard')  {
        const name   = document.getElementById('npc-name').value.trim();
        const owner  = document.getElementById('npc-owner').value;
        const amount = parseFloat(document.getElementById('npc-amount').value)||0;
        const note   = document.getElementById('npc-note').value.trim();
        if (!name) return;
        const md = getMonthData();
        md.personalCards = md.personalCards || [];
        md.personalCards.push({id: md.nextPersonalId++, name, owner, amount, note});
        state.showAddPersonalCard=false; saveState(); render();
      }
      else if (action==='insights-view') {
        state.insightsView = el.dataset.view;
        saveState();
        render();
      }
      else if (action==='set-split-mode') {
        // Toggle split mode on an existing card (in edit form)
        const newMode = el.dataset.mode;
        const md=getMonthData();
        md.cards = md.cards.map(c=>c.id===id?{...c,splitMode:newMode}:c);
        render(); // no save yet — user still in edit form
      }
      else if (action==='new-card-mode') {
        // Toggle split mode in the add-card form without re-rendering everything
        const newMode = el.dataset.mode;
        const hiddenInput = document.getElementById('nc-split-mode');
        if (hiddenInput) hiddenInput.value = newMode;
        // Update button styles
        document.querySelectorAll('[data-action="new-card-mode"]').forEach(btn => {
          const active = btn.dataset.mode === newMode;
          btn.style.background = active ? 'var(--kyle)' : 'transparent';
          btn.style.color = active ? '#fff' : 'var(--muted)';
        });
        // Swap input area
        const inputsDiv = document.getElementById('nc-inputs');
        if (inputsDiv) {
          if (newMode === 'half') {
            inputsDiv.innerHTML = `<div>
              <div class="field-label">Total bill amount</div>
              <input class="inp" id="nc-total" type="number" inputmode="decimal" placeholder="0.00" style="font-family:monospace;color:var(--green)"/>
            </div>`;
          } else {
            inputsDiv.innerHTML = `<div class="form-row">
              <div>
                <div class="field-label" style="color:${KYLE}">Kyle's charges</div>
                <input class="inp" id="nc-kyle" type="number" inputmode="decimal" placeholder="0.00" style="font-family:monospace;color:${KYLE}"/>
              </div>
              <div>
                <div class="field-label" style="color:${KIRS}">Kirsten's charges</div>
                <input class="inp" id="nc-kirsten" type="number" inputmode="decimal" placeholder="0.00" style="font-family:monospace;color:${KIRS}"/>
              </div>
            </div>`;
          }
        }
      }
      else if (action==='confirm-add-card') {
        const name=document.getElementById('nc-name').value.trim();
        const paidBy=document.getElementById('nc-payer').value;
        const splitMode=(document.getElementById('nc-split-mode')||{}).value||'charges';
        if (!name) return;
        const md=getMonthData();
        if (!md.nextCardId) md.nextCardId=101;
        let newCard = {id:md.nextCardId++, name, paidBy, splitMode};
        if (splitMode==='half') {
          newCard.totalAmount = parseFloat(document.getElementById('nc-total')?.value)||0;
        } else {
          newCard.kyleAmount    = parseFloat(document.getElementById('nc-kyle')?.value)||0;
          newCard.kirstenAmount = parseFloat(document.getElementById('nc-kirsten')?.value)||0;
        }
        md.cards.push(newCard);
        state.showAddCard=false; saveState(); render();
      }
    });
  });
}

// ─── Header controls ──────────────────────────────────────────────────────────
document.getElementById('tabs').addEventListener('click', e => {
  const tab=e.target.closest('[data-tab]');
  if (!tab) return;
  state.activeTab=tab.dataset.tab;
  state.editingBill=null; state.editingCard=null; state.editingPersonalCard=null;
  state.showAddBill=false; state.showAddCard=false; state.showAddPersonalCard=false;
  state.showAddFamilyCard=false;
  render();
});

document.getElementById('prev-month').addEventListener('click', () => {
  state.viewMonth--;
  if (state.viewMonth<0){state.viewMonth=11;state.viewYear--;}
  state.editingCard=null; state.showAddCard=false;
  render();
});
document.getElementById('next-month').addEventListener('click', () => {
  state.viewMonth++;
  if (state.viewMonth>11){state.viewMonth=0;state.viewYear++;}
  state.editingCard=null; state.showAddCard=false;
  render();
});
document.getElementById('go-today').addEventListener('click', () => {
  const now=new Date();
  state.viewYear=now.getFullYear(); state.viewMonth=now.getMonth();
  render();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
</html>
