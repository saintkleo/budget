<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Combs Family Budget</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root {
  /* Kyle – vibrant orange */
  --kyle:       #f97316;
  --kyle-bg:    #1c0e04;
  --kyle-glow:  #f9731628;
  /* Kirsten – magenta purple (reference UI) */
  --kirs:       #c026d3;
  --kirs-bg:    #170a1c;
  --kirs-glow:  #c026d328;
  /* Surplus green */
  --green:      #10b981;
  --green-glow: #10b98120;
  --amber:      #f97316;
  /* Deep charcoal blacks – reference UI vibe */
  --bg:         #0d0d0f;
  --bg2:        #0f0f12;
  --surface:    #131316;
  --card:       #16161a;
  --card2:      #1a1a1f;
  --border:     #242428;
  --border2:    #2c2c34;
  --border3:    #38383f;
  /* Text – slightly cool white like the reference */
  --text:       #f4f4f6;
  --text2:      #c8c8d0;
  --muted:      #5a5a68;
  --sub:        #8888a0;
  --scan-line:  rgba(249,115,22,.018);
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html{height:100%;background:var(--bg)}
body{
  background:
    radial-gradient(ellipse 90% 55% at -5% -5%, #2a1040 0%, #1a0828 35%, transparent 65%),
    radial-gradient(ellipse 70% 45% at 105% 105%, #2a1200 0%, #1e0e00 30%, transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:'Inter',system-ui,sans-serif;
  max-width:600px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
}

/* Subtle scanline texture */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scan-line) 2px,var(--scan-line) 4px);
  pointer-events:none;
  z-index:0;
}

/* ── Corner ambient glows ── */
#corner-tl,#corner-br{
  position:fixed;pointer-events:none;z-index:0;border-radius:50%;
}
#corner-tl{
  width:340px;height:340px;
  top:-100px;left:-100px;
  background:radial-gradient(circle, #7c2de840 0%, #4a1a9020 40%, transparent 70%);
  animation:pulse-tl 6s ease-in-out infinite;
  filter:blur(8px);
}
#corner-br{
  width:380px;height:380px;
  bottom:-120px;right:-120px;
  background:radial-gradient(circle, #f9731650 0%, #ea580c28 40%, transparent 70%);
  animation:pulse-br 7s ease-in-out infinite;
  filter:blur(10px);
}
@keyframes pulse-tl{
  0%,100%{ opacity:.55; transform:scale(1); }
  50%    { opacity:.85; transform:scale(1.08); }
}
@keyframes pulse-br{
  0%,100%{ opacity:.50; transform:scale(1); }
  50%    { opacity:.80; transform:scale(1.1); }
}

input,select,button{font-family:'Inter',system-ui,sans-serif;outline:none;appearance:none;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{display:none}

/* ── Top spacer ── */
#top-bar{
  background:linear-gradient(180deg, #020202 0%, transparent 100%);
  padding:env(safe-area-inset-top,8px) 0 0;
  height:calc(env(safe-area-inset-top,8px) + 8px);
}

/* ── Sticky Header ── */
#header{
  background:linear-gradient(180deg,#111114f0 0%,#0d0d0f88 100%);
  border-bottom:1px solid var(--border2);
  border-top:1px solid #ffffff08;
  padding:14px 18px 0;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(20px) saturate(150%);
  -webkit-backdrop-filter:blur(20px) saturate(150%);
  box-shadow:0 1px 0 #ffffff05, 0 8px 32px #00000060;
}

/* Header glow line at top */
#header::before{
  content:'';
  position:absolute;
  top:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--kirs)66, var(--kyle)55, transparent);
}

#header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}

.header-left{display:flex;flex-direction:column;gap:3px}
.header-eyebrow{
  font-size:8px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--kyle);font-weight:700;opacity:.7;
}
.header-names{display:flex;align-items:center;gap:8px}
.avatar{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;flex-shrink:0;
  position:relative;
}
.avatar::after{
  content:'';position:absolute;inset:-2px;
  border-radius:50%;
  background:conic-gradient(from 0deg, transparent 30%, currentColor 50%, transparent 70%);
  opacity:.3;
  animation:spin 6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.avatar-kyle{
  background:var(--kyle-bg);color:var(--kyle);
  border:1px solid var(--kyle)44;
  box-shadow:0 0 12px var(--kyle-glow), inset 0 1px 0 #ffffff10;
}
.avatar-kirs{
  background:var(--kirs-bg);color:var(--kirs);
  border:1px solid var(--kirs)44;
  box-shadow:0 0 12px var(--kirs-glow), inset 0 1px 0 #ffffff10;
}
.avatar-amp{font-size:11px;color:var(--muted);font-weight:300}
.header-title{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.03em;line-height:1}
.header-title-input{
  font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.03em;line-height:1;
  background:transparent;border:none;border-bottom:1px solid var(--kyle);
  padding:0 2px;width:200px;max-width:52vw;
  font-family:'Inter',system-ui,sans-serif;
  caret-color:var(--kyle);
}
.header-title-input:focus{outline:none}

.header-right{text-align:right}
.header-total-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;font-weight:600;margin-bottom:2px}
#header-total-value{
  font-size:26px;font-weight:900;
  font-family:'JetBrains Mono','Fira Code',monospace;
  color:var(--text);letter-spacing:-.03em;
  text-shadow:0 0 20px #f9731628;
}

/* Month bar */
#month-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 2px}
.month-nav{
  background:var(--card);border:1px solid var(--border2);
  color:var(--sub);font-size:14px;cursor:pointer;
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.month-nav:active{background:var(--border2);color:var(--text)}
#month-label{
  font-size:12px;font-weight:700;color:var(--text2);
  flex:1;text-align:center;letter-spacing:.06em;
  text-transform:uppercase;
}
.month-reset{
  font-size:10px;color:var(--muted);
  background:var(--card);border:1px solid var(--border2);
  border-radius:6px;padding:4px 10px;cursor:pointer;
  font-weight:600;letter-spacing:.04em;
  transition:all .15s;
}
.month-reset:active{color:var(--kyle);border-color:var(--kyle)44}

/* Tabs */
#tabs{display:flex;gap:0;border-top:1px solid var(--border)}
.tab{
  flex:1;padding:11px 4px 10px;border:none;background:transparent;
  color:var(--muted);font-size:10px;font-weight:700;
  border-bottom:2px solid transparent;cursor:pointer;
  letter-spacing:.04em;text-transform:uppercase;
  transition:all .2s;position:relative;
}
.tab.active{
  color:var(--kyle);
  border-bottom-color:var(--kyle);
  text-shadow:0 0 12px var(--kyle)66;
}
.tab.active::before{
  content:'';position:absolute;bottom:-1px;left:20%;right:20%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--kyle),transparent);
  filter:blur(2px);
}

/* app-shell: transparent wrapper on mobile */
#app-shell{display:block;}
#sidebar{display:block;}
#main-area{display:block;}
#sidebar-footer{display:none;}

/* ── Content ── */
#content{padding:18px 16px;padding-bottom:100px;position:relative;z-index:1}

/* ── Bottom bar ── */
#bottom-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:600px;
  background:linear-gradient(0deg,#0d0d0f 0%,#0d0d0f00 100%);
  height:calc(env(safe-area-inset-bottom,0px) + 60px);
  pointer-events:none;z-index:50;
}
#bottom-bar::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
}

/* ── Glass card ── */
.g-card{
  background:linear-gradient(145deg, var(--card2) 0%, var(--card) 100%);
  border-radius:16px;
  border:1px solid var(--border2);
  overflow:hidden;
  margin-bottom:12px;
  box-shadow:
    0 1px 0 #ffffff08 inset,
    0 -1px 0 #00000040 inset,
    0 8px 32px #00000050,
    0 2px 8px #00000030;
  position:relative;
}
/* Reflection shimmer on cards */
.g-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;
  height:40%;
  background:linear-gradient(180deg,#ffffff06 0%,transparent 100%);
  border-radius:16px 16px 0 0;
  pointer-events:none;
}

/* ── Stat grid ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:14px;padding:14px 15px;
  border:1px solid var(--border2);
  box-shadow:0 1px 0 #ffffff07 inset,0 6px 24px #00000040;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,#ffffff12,transparent);
}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;font-weight:700;margin-bottom:5px}
.stat-value{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500}

/* ── Pill ── */
.pill{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.04em}
.pill-kyle{background:var(--kyle-bg);color:var(--kyle);border:1px solid var(--kyle)33;box-shadow:0 0 8px var(--kyle-glow)}
.pill-kirs{background:var(--kirs-bg);color:var(--kirs);border:1px solid var(--kirs)33;box-shadow:0 0 8px var(--kirs-glow)}

/* ── Category group ── */
.cat-header{display:flex;align-items:center;gap:7px;margin:16px 0 7px}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor}
.cat-name{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.cat-total{margin-left:auto;font-size:11px;color:var(--sub);font-family:'JetBrains Mono',monospace;font-weight:600}

/* ── Bill row ── */
.bill-row{display:flex;align-items:center;gap:10px;padding:13px 15px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s}
.bill-row:first-child{border-top:none}
.bill-row:active{background:#ffffff05}
.bill-name{font-size:14px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.bill-note{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bill-amount{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--text);text-align:right}
.bill-freq-badge{font-size:9px;background:var(--kyle-bg);color:var(--kyle);border-radius:5px;padding:2px 6px;font-weight:800;letter-spacing:.06em;border:1px solid var(--kyle)22}
.chevron{color:var(--border3);font-size:18px;flex-shrink:0}

/* ── Forms ── */
.edit-form{padding:14px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--border);background:#0f0f12}
.edit-form:first-child{border-top:none}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.inp{
  background:#0b0b0e;border:1px solid var(--border2);
  border-radius:10px;padding:11px 13px;
  color:var(--text);font-size:14px;width:100%;
  transition:border-color .15s,box-shadow .15s;
  font-family:'Inter',system-ui,sans-serif;
}
.inp:focus{border-color:var(--kyle);box-shadow:0 0 0 3px var(--kyle-glow),0 0 16px var(--kyle-glow)}
.inp::placeholder{color:#2a2a32}
.field-label{font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:5px}
.btn-row{display:flex;gap:8px;margin-top:2px}
.btn-primary{
  background:linear-gradient(135deg,#ea580c,var(--kyle));
  border:none;border-radius:10px;padding:12px 18px;
  color:#fff;font-weight:800;font-size:14px;cursor:pointer;flex:1;
  letter-spacing:.02em;
  box-shadow:0 4px 16px var(--kyle-glow),0 1px 0 #ffffff20 inset;
  transition:all .15s;
}
.btn-primary:active{transform:translateY(1px);box-shadow:0 2px 8px var(--kyle-glow)}
.btn-secondary{
  background:var(--card);border:1px solid var(--border2);
  border-radius:10px;padding:12px 18px;color:var(--sub);
  font-size:14px;cursor:pointer;flex:1;
  box-shadow:0 1px 0 #ffffff06 inset;
}
.btn-danger{
  background:#110508;border:1px solid #5a1020;
  border-radius:10px;padding:12px 18px;color:#f87171;
  font-size:14px;cursor:pointer;flex:1;
}
.add-btn{
  width:100%;background:var(--card);
  border:1px dashed var(--border3);
  border-radius:12px;padding:14px;color:var(--muted);
  font-size:13px;cursor:pointer;font-weight:600;margin-top:10px;
  transition:all .2s;letter-spacing:.02em;
  box-shadow:0 1px 0 #ffffff04 inset;
}
.add-btn:active{border-color:var(--kyle);color:var(--kyle);box-shadow:0 0 16px var(--kyle-glow)}
.add-form{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  padding:15px;margin-top:10px;
  display:flex;flex-direction:column;gap:10px;
  box-shadow:0 8px 32px #00000050,0 1px 0 #ffffff07 inset;
}
.add-form-title{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.14em}

/* ── Credit cards ── */
.cc-hdr{display:flex;justify-content:space-between;align-items:center;padding:14px 15px;border-bottom:1px solid var(--border);cursor:pointer}
.cc-name{font-size:14px;font-weight:700;color:var(--text);margin-left:8px}
.cc-grid{display:grid;grid-template-columns:1fr 1fr}
.cc-cell{padding:12px 15px}
.cc-cell+.cc-cell{border-left:1px solid var(--border)}
.cc-cell-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}
.cc-cell-val{font-size:20px;font-weight:900;font-family:'JetBrains Mono',monospace}
.cc-footer{padding:8px 15px;background:#00000020;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border)}
.cc-total{font-size:11px;color:var(--muted)}
.cc-owed{font-size:11px;color:var(--green);font-weight:700;text-shadow:0 0 8px var(--green-glow)}

/* ── Settlement ── */
/* Rotating border wrapper */
.transfer-hero-wrap{
  position:relative;
  border-radius:20px;
  padding:2px;                   /* border thickness */
  margin-bottom:16px;
  background:conic-gradient(
    from var(--angle,0deg),
    transparent 0deg,
    transparent 60deg,
    #f97316 90deg,
    #fb923c 120deg,
    #fbbf24 150deg,
    #f97316 180deg,
    transparent 210deg,
    transparent 360deg
  );
  animation:spin-border 3s linear infinite;
  box-shadow:
    0 0 28px #f9731638,
    0 0 56px #f9731620,
    0 0 80px #f9731610,
    0 16px 48px #00000080;
}
@property --angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}
@keyframes spin-border{
  to { --angle: 360deg; }
}

/* Fallback for browsers without @property support */
@supports not (background: conic-gradient(from 1deg, red, blue)) {
  .transfer-hero-wrap {
    background: linear-gradient(135deg, #f97316, #fbbf24, #f97316);
    animation: none;
  }
}

.transfer-hero{
  border-radius:18px;padding:28px 20px;
  text-align:center;position:relative;overflow:hidden;
  /* Inner shine layers */
  background:inherit; /* set per-element inline */
  box-shadow:
    0 1px 0 #ffffff12 inset,
    0 -1px 0 #00000040 inset;
}

/* Top shine — bright streak across top third */
.transfer-hero::before{
  content:'';position:absolute;
  top:0;left:-20%;right:-20%;
  height:55%;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%, #ffffff14 0%, transparent 70%),
    linear-gradient(180deg, #ffffff0a 0%, transparent 60%);
  pointer-events:none;
  border-radius:18px 18px 60% 60%;
}

/* Bottom reflection line + orange glow wash */
.transfer-hero::after{
  content:'';position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 90% 50% at 50% 120%, #f9731622 0%, transparent 65%),
    radial-gradient(ellipse 60% 30% at 50% 100%, #fb923c14 0%, transparent 50%),
    linear-gradient(180deg, transparent 40%, #f9731610 100%);
  pointer-events:none;
}
.transfer-eyebrow{font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);font-weight:700;margin-bottom:10px}
.transfer-amount{font-size:52px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:-.03em;margin-bottom:10px;line-height:1}
.transfer-dir{font-size:14px;color:var(--sub);display:flex;align-items:center;justify-content:center;gap:10px}
.transfer-arrow{font-size:16px}
.breakdown-card{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  overflow:hidden;margin-bottom:12px;
  box-shadow:0 8px 32px #00000044,0 1px 0 #ffffff06 inset;
}
.breakdown-hd{padding:12px 16px;border-bottom:1px solid var(--border);background:#00000025;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}
.sec-hd{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#ffffff04}
.sec-hd-lbl{font-size:12px;font-weight:700}
.sec-hd-val{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700}
.brow{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f172a30;padding:7px 16px}
.brow.indent{padding-left:28px}
.brow-lbl{font-size:13px;color:var(--sub)}
.brow.indent .brow-lbl{font-size:12px;color:var(--muted)}
.brow-note{font-size:10px;color:var(--muted);margin-left:5px}
.brow-val{font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--sub)}
.brow.indent .brow-val{font-size:12px;color:var(--muted)}
.brow-val.hi{font-weight:700}
.div-line{height:1px;background:var(--border)}
.net-row{padding:14px 16px;background:#ffffff05}
.net-top{display:flex;justify-content:space-between;align-items:center}
.net-lbl{font-size:13px;font-weight:700;color:var(--text)}
.net-val{font-size:22px;font-weight:900;font-family:'JetBrains Mono',monospace;color:var(--green);text-shadow:0 0 16px var(--green-glow)}
.net-sub{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}

/* ── Section dividers ── */
.section-divider{display:flex;align-items:center;gap:10px;margin:22px 0 12px}
.section-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.section-divider-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);white-space:nowrap;padding:3px 10px;background:var(--surface);border-radius:20px;border:1px solid var(--border2)}

/* ── Pie chart ── */
.chart-wrap{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  padding:18px 16px;margin-bottom:12px;
  box-shadow:0 8px 32px #00000044,0 1px 0 #ffffff06 inset;
}
.chart-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:14px}
.chart-inner{display:flex;align-items:center;gap:16px}
#pie-svg{flex-shrink:0}
.chart-legend{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:12px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-pct{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700;flex-shrink:0}

/* ── Month history ── */
.hist-card{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  overflow:hidden;margin-bottom:12px;
  box-shadow:0 8px 32px #00000044,0 1px 0 #ffffff06 inset;
}
.hist-row{display:flex;align-items:center;gap:10px;padding:12px 15px;border-top:1px solid var(--border)}
.hist-row:first-child{border-top:none}
.hist-month{font-size:13px;font-weight:600;color:var(--text2);flex:1}
.hist-total{font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--sub)}
.hist-transfer{font-size:12px;font-family:'JetBrains Mono',monospace;font-weight:700}

/* ── Personal cards ── */
.personal-card-row{display:flex;align-items:center;gap:10px;padding:13px 15px;border-top:1px solid var(--border);cursor:pointer;transition:background .12s}
.personal-card-row:first-child{border-top:none}
.personal-card-row:active{background:#ffffff04}

/* ── Income section ── */
.income-card{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  padding:16px;margin-bottom:12px;
  box-shadow:0 8px 32px #00000044,0 1px 0 #ffffff06 inset;
}
.income-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.income-row:last-child{margin-bottom:0}
.income-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0}
.income-label{font-size:13px;color:var(--sub);flex:1;font-weight:500}
.income-inp{
  background:#0b0b0e;border:1px solid var(--border2);
  border-radius:9px;padding:9px 12px;
  color:var(--text);font-size:15px;
  font-family:'JetBrains Mono',monospace;font-weight:700;
  width:150px;text-align:right;
  transition:border-color .15s,box-shadow .15s;
}
.income-inp:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow),0 0 16px var(--green-glow);outline:none}
.income-inp::placeholder{color:#2a2a32;font-weight:400}

/* ── View toggle ── */
.view-toggle{
  display:flex;
  background:#0b0b0e;border:1px solid var(--border2);
  border-radius:11px;overflow:hidden;margin-bottom:14px;
  padding:3px;gap:3px;
}
.view-toggle-btn{
  flex:1;padding:8px 6px;border:none;
  background:transparent;color:var(--muted);
  font-size:11px;font-weight:700;cursor:pointer;
  letter-spacing:.04em;border-radius:8px;
  transition:all .2s;
}
.view-toggle-btn.active{
  background:var(--kyle);color:#fff;
  box-shadow:0 2px 12px var(--kyle-glow);
}

/* ── Line chart ── */
.line-chart-wrap{
  background:linear-gradient(145deg,var(--card2),var(--card));
  border-radius:16px;border:1px solid var(--border2);
  padding:16px;margin-bottom:12px;
  box-shadow:0 8px 32px #00000044,0 1px 0 #ffffff06 inset;
  overflow:hidden;
}
.line-chart-title{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--muted);margin-bottom:3px}
.line-chart-sub{font-size:11px;color:var(--muted);margin-bottom:14px}
#line-svg{width:100%;overflow:visible}
.line-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px}
.line-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.line-legend-dot{width:20px;height:3px;border-radius:2px;flex-shrink:0}

/* ── Surplus bars ── */
.surplus-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.surplus-name{font-size:12px;color:var(--sub);width:54px;flex-shrink:0;font-weight:500}
.surplus-bar-track{flex:1;height:6px;background:var(--border2);border-radius:4px;overflow:hidden}
.surplus-bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.surplus-val{font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:700;min-width:70px;text-align:right}

/* ── Toast ── */
.save-toast{
  position:fixed;bottom:calc(env(safe-area-inset-bottom,0px)+28px);
  left:50%;transform:translateX(-50%);
  background:#111114ee;
  border:1px solid var(--green)66;
  color:var(--green);font-size:11px;font-weight:700;
  padding:8px 20px;border-radius:30px;
  opacity:0;transition:opacity .3s;
  pointer-events:none;white-space:nowrap;z-index:999;
  box-shadow:0 0 20px var(--green-glow);
  letter-spacing:.06em;
}
.save-toast.show{opacity:1}

/* ── Water (keeping css just in case) ── */
.water-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;padding:14px 16px;margin-bottom:12px}

.hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:14px;font-weight:400}

/* ── Monospace numbers everywhere ── */
.mono{font-family:'JetBrains Mono',monospace}

/* ═══════════════════════════════════════════════════════════════
   DESKTOP LAYOUT  ≥ 960px
   Sidebar (300px fixed) + scrollable main column
   Mobile styles are completely untouched below this breakpoint
═══════════════════════════════════════════════════════════════ */
@media (min-width: 960px) {

  /* Kill the mobile max-width centering; fill the viewport */
  html, body {
    max-width: 100%;
    height: 100%;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(ellipse 50% 80% at -5% 50%, #2a1040 0%, #1a0828 30%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 105% 80%, #2a1200 0%, #1e0e00 25%, transparent 55%),
      var(--bg);
  }

  /* Corner orbs scale up on desktop */
  #corner-tl { width:500px; height:500px; top:-180px; left:-180px; }
  #corner-br { width:550px; height:550px; bottom:-200px; right:-200px; }

  #top-bar { display:none; }
  #bottom-bar { display:none; }

  /* ── Outer shell: sidebar + main ── */
  #app-shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 300px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border2);
    background: linear-gradient(180deg, #111114f5 0%, #0d0d0ff5 100%);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    position: relative;
    z-index: 10;
    box-shadow: 2px 0 32px #00000050;
  }

  /* Sidebar top glow line */
  #sidebar::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--kirs)66, var(--kyle)44, transparent);
  }

  /* ── Sidebar header ── */
  #header {
    position: relative;
    top: auto;
    padding: 24px 20px 0;
    border-bottom: 1px solid var(--border);
    border-right: none;
    background: transparent;
    box-shadow: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    flex-shrink: 0;
  }
  #header::before { display: none; }

  #header-top {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 16px;
  }

  .header-left { width: 100%; }

  .header-eyebrow {
    font-size: 9px;
    letter-spacing: .2em;
    margin-bottom: 6px;
    opacity: 1;
  }

  .header-names { gap: 10px; }

  .avatar { width: 36px; height: 36px; font-size: 14px; }

  .header-title { font-size: 16px; }
  .header-title-input { font-size: 16px; width: 170px; max-width: 180px; }

  .header-right {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  #header-total-value { font-size: 28px; }

  /* ── Month bar in sidebar ── */
  #month-bar {
    margin-bottom: 14px;
    padding: 0;
  }

  /* ── Vertical tabs ── */
  #tabs {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--border);
    border-bottom: none;
    gap: 2px;
    padding: 10px 12px;
  }
  .tab {
    flex: none;
    text-align: left;
    padding: 11px 14px;
    border-bottom: none;
    border-left: 2px solid transparent;
    border-radius: 10px;
    font-size: 12px;
    letter-spacing: .04em;
  }
  .tab.active {
    background: linear-gradient(90deg, var(--kyle)14, transparent);
    border-left-color: var(--kyle);
    border-bottom-color: transparent;
  }
  .tab.active::before { display: none; }

  /* ── Sidebar footer: month nav nicely at bottom ── */
  #sidebar-footer {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #sidebar-status {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .18em;
    font-weight: 600;
  }
  #sidebar-status span {
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Main content area ── */
  #main-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  #main-area::-webkit-scrollbar { width: 4px; }
  #main-area::-webkit-scrollbar-track { background: transparent; }
  #main-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Content padding */
  #content {
    padding: 28px 32px;
    padding-bottom: 40px;
    max-width: 900px;
    width: 100%;
  }

  /* ── Desktop grid: stat cards 2-up stays the same ── */
  .stat-grid { gap: 14px; margin-bottom: 20px; }
  .stat-card { padding: 16px 18px; }
  .stat-value { font-size: 22px; }

  /* ── Family Split: bills + settlement side by side ── */
  #family-split-grid {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 24px;
    align-items: start;
  }
  #family-bills-col { min-width: 0; }
  #family-settle-col { position: sticky; top: 24px; }

  /* ── Insights: pie + line side by side ── */
  #insights-top-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
    margin-bottom: 20px;
  }

  /* ── Transfer hero wider ── */
  .transfer-amount { font-size: 60px; }

  /* ── Cards: 2-col card grid ── */
  #shared-cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  #shared-cards-grid .g-card { margin-bottom: 0; }

  /* ── Bill rows slightly more spacious ── */
  .bill-row { padding: 14px 18px; }
  .bill-name { font-size: 15px; }
  .bill-amount { font-size: 16px; }

  /* ── Section dividers more breathing room ── */
  .section-divider { margin: 26px 0 14px; }

  /* Chart wraps fill their grid cell */
  .chart-wrap, .line-chart-wrap { margin-bottom: 0; }

  /* Wider pie chart */
  #pie-svg { width: 180px; height: 180px; }

  /* History table full width */
  .hist-card { margin-bottom: 0; }

  /* Personal cards 2-col */
  #personal-cards-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  #personal-cards-grid .g-card { margin-bottom: 0; }
}

</style>

<body>

<div id="corner-tl"></div>
<div id="corner-br"></div>
<div id="top-bar"></div>

<div id="app-shell">

  <!-- ── Sidebar (desktop) / Sticky header (mobile) ── -->
  <div id="sidebar">
    <div id="header">
      <div id="header-top">
        <div class="header-left">
          <div class="header-eyebrow">Family Command Center</div>
          <div class="header-names">
            <div class="avatar avatar-kyle" id="avatar-kyle" title="Tap to rename" style="cursor:pointer"></div>
            <span class="avatar-amp">&amp;</span>

            <span class="header-title" id="household-name-display" title="Tap to rename" style="cursor:pointer"></span>
          </div>
          <input id="household-name-input" class="header-title-input" type="text" maxlength="32" placeholder="Family name…" style="display:none"/>
          <!-- Person name edit popup -->
          <div id="person-edit-popup" style="display:none;position:absolute;top:52px;left:16px;z-index:200;
            background:#16161a;border:1px solid var(--border2);border-radius:14px;padding:14px 16px;
            box-shadow:0 8px 32px #00000080,0 0 0 1px #ffffff08;min-width:220px">
            <div style="font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);margin-bottom:10px" id="person-edit-label">Edit Name</div>
            <div style="display:flex;gap:8px;align-items:center">
              <div id="person-edit-avatar" style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0"></div>
              <input id="person-edit-input" type="text" maxlength="20" placeholder="Name…"
                style="flex:1;background:#0b0b0e;border:1px solid var(--border2);border-radius:9px;
                padding:9px 12px;color:var(--text);font-size:15px;font-weight:700;font-family:'Inter',sans-serif;"/>
              <button id="person-edit-save" style="background:var(--kyle);border:none;border-radius:9px;padding:9px 14px;color:#fff;font-weight:800;font-size:13px;cursor:pointer">✓</button>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:8px">Updates all names throughout the app</div>
          </div>

        <div class="header-right">

      <div id="tabs">
        <button class="tab active" data-tab="family">🏠 Family Split</button>
        <button class="tab" data-tab="personal">👤 Personal</button>

  <div id="main-area">

</div><!-- /app-shell -->

<div id="bottom-bar"></div>
<div class="save-toast" id="toast">✦ Saved</div>

<script>
// ─── Desktop helper ──────────────────────────────────────────────────────────
const isDesktop = () => window.innerWidth >= 960;

// ─── Constants ────────────────────────────────────────────────────────────────
const KYLE  = '#f97316';
const KIRS  = '#c026d3';
const GREEN = '#10b981';

const CAT_COLORS = {
  housing:'#f97316', utilities:'#fb923c', insurance:'#10b981',
  auto:'#c026d3', subscriptions:'#a21caf', credit:'#e879f9', other:'#6b6b7a'
};
const CATS = ['housing','utilities','insurance','auto','subscriptions','other'];

const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

const STORAGE_KEY = 'kk-budget-v2';

// ─── Default bills (fixed recurring) ─────────────────────────────────────────
const DEFAULT_BILLS = [
  {id:1, name:'Xcel Energy',  amount:158,  frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:2, name:'Quantum',      amount:80,   frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:3, name:'Water',        amount:0,    frequency:'quarterly', paidBy:'kyle',    category:'utilities', note:''},
  {id:4, name:'State Farm',   amount:225,  frequency:'monthly',   paidBy:'kyle',    category:'insurance', note:''},
  {id:5, name:'Natural Gas',  amount:60,   frequency:'monthly',   paidBy:'kyle',    category:'utilities', note:''},
  {id:6, name:'Mortgage',     amount:1750, frequency:'monthly',   paidBy:'kirsten', category:'housing',   note:''},
  {id:7, name:'Car Payment',  amount:670,  frequency:'monthly',   paidBy:'kirsten', category:'auto',      note:''},
];

// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  activeTab: 'family',
  editingBill: null,
  editingCard: null,
  showAddBill: false,
  showAddCard: false,
  editingPersonalCard: null,
  showAddPersonalCard: false,
  insightsView: 'combined',
  householdName: 'Combs Family Budget',
  person1: { key:'kyle',    name:'Kyle',    initial:'K' },
  person2: { key:'kirsten', name:'Kirsten', initial:'K' },
  pieMode: 'spend',
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  bills: DEFAULT_BILLS,
  nextBillId: 8,
  // monthData: { "YYYY-MM": { cards: [...], notes: "" } }
  monthData: {
    // Seed current month with default cards so they're ready to use
  },
};

// ─── Person name helpers ─────────────────────────────────────────────────────
function pName(key) { return key==='kyle' ? state.person1.name : state.person2.name; }
function pInitial(key) {
  const n = key==='kyle' ? state.person1.name : state.person2.name;
  return n.charAt(0).toUpperCase();
}

// Helper: get resolved amounts for any card regardless of mode
function cardDisplayAmounts(card) {
  const mode = card.splitMode || 'charges';
  if (mode === 'half') {
    const total = parseFloat(card.totalAmount)||0;
    return { ka: total/2, kia: total/2, total, owedByOther: total/2, otherName: pName(card.paidBy==='kyle'?'kirsten':'kyle') };
  }
  const ka  = parseFloat(card.kyleAmount)||0;
  const kia = parseFloat(card.kirstenAmount)||0;
  return { ka, kia, total: ka+kia, owedByOther: card.paidBy==='kyle'?kia:ka, otherName: pName(card.paidBy==='kyle'?'kirsten':'kyle') };
}


// ─── Income helpers ───────────────────────────────────────────────────────────
function getIncome(key) {
  const md = state.monthData[key];
  return {
    kyle:    parseFloat(md?.kyleIncome)    || 0,
    kirsten: parseFloat(md?.kirstenIncome) || 0,
  };
}

function setIncome(key, who, val) {
  if (!state.monthData[key]) state.monthData[key] = {};
  if (!state.monthData[key].nextCardId) state.monthData[key].nextCardId = 101;
  if (!state.monthData[key].cards)      state.monthData[key].cards      = [];
  state.monthData[key][who === 'kyle' ? 'kyleIncome' : 'kirstenIncome'] = val;
}

// Build a sorted list of up to N months for charting
function getChartMonths(n) {
  const now = new Date();
  const months = [];
  for (let i = n-1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const yr = d.getFullYear(), mo = d.getMonth();
    const key = `${yr}-${String(mo+1).padStart(2,'0')}`;
    months.push({ key, yr, mo, label: MONTHS[mo].slice(0,3) + ' ' + String(yr).slice(2) });
  }
  return months;
}

// Compute per-person spending for a given month key
function getSpending(key) {
  const origY = state.viewYear, origM = state.viewMonth;
  const [yr, mo] = key.split('-').map(Number);
  state.viewYear = yr; state.viewMonth = mo - 1;
  const s = calcSettlement();
  state.viewYear = origY; state.viewMonth = origM;

  // Kyle's spending: his bills + his card charges + his personal cards
  const mdSnap = state.monthData[key] || {};
  const pCards = mdSnap.personalCards || [];
  const kylePersonal    = pCards.filter(c=>c.owner==='kyle').reduce((a,c)=>a+(parseFloat(c.amount)||0),0);
  const kirstenPersonal = pCards.filter(c=>c.owner==='kirsten').reduce((a,c)=>a+(parseFloat(c.amount)||0),0);

  const kyleSpend = s.kyleBillsTotal + s.cards.reduce((a,c) => {
    const { ka } = cardDisplayAmounts(c);
    return a + ka;
  }, 0) + kylePersonal;
  // Kirsten's spending: her bills + her card charges + her personal cards
  const kirstenSpend = s.kirstenBillsTotal + s.cards.reduce((a,c) => {
    const { kia } = cardDisplayAmounts(c);
    return a + kia;
  }, 0) + kirstenPersonal;

  return { kyle: kyleSpend, kirsten: kirstenSpend, total: s.grandTotal };
}

// ─── Persistence ──────────────────────────────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return;
    const p = JSON.parse(s);
    if (p.bills)       state.bills       = p.bills;
    if (p.nextBillId)  state.nextBillId  = p.nextBillId;
    if (p.monthData)   state.monthData   = p.monthData;
    if (p.insightsView) state.insightsView = p.insightsView;
    if (p.pieMode)        state.pieMode        = p.pieMode;
    if (p.householdName)  state.householdName  = p.householdName;
    if (p.person1)        state.person1        = p.person1;
    if (p.person2)        state.person2        = p.person2;
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      bills:       state.bills,
      nextBillId:  state.nextBillId,
      monthData:   state.monthData,
      insightsView:   state.insightsView,
      pieMode:        state.pieMode,
      householdName:  state.householdName,
      person1:        state.person1,
      person2:        state.person2,
    }));
    showToast();
  } catch(e) {}
}

let toastTimer;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1500);
}

// ─── Month key ────────────────────────────────────────────────────────────────
function monthKey() {
  return `${state.viewYear}-${String(state.viewMonth+1).padStart(2,'0')}`;
}

function getMonthData() {
  const k = monthKey();
  if (!state.monthData[k]) state.monthData[k] = { cards: [] };
  if (!state.monthData[k].nextCardId)     state.monthData[k].nextCardId     = 101;
  if (!state.monthData[k].cards)          state.monthData[k].cards          = [];
  if (!state.monthData[k].personalCards)  state.monthData[k].personalCards  = [];
  if (!state.monthData[k].nextPersonalId) state.monthData[k].nextPersonalId = 201;
  return state.monthData[k];
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:2}).format(n||0);
const toMonthly = (a,f) => f==='quarterly' ? a/3 : f==='annual' ? a/12 : Number(a)||0;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function pill(who) {
  const cls   = who==='kyle' ? 'pill-kyle' : 'pill-kirs';
  return `<span class="pill ${cls}">${esc(pName(who))}</span>`;
}

// ─── Settlement calc ──────────────────────────────────────────────────────────
function calcSettlement() {
  const md = getMonthData();
  const cards = md.cards || [];

  const processed = state.bills.map(b => ({...b, monthly: toMonthly(b.amount, b.frequency)}));
  const kyleBills    = processed.filter(b => b.paidBy==='kyle');
  const kirstenBills = processed.filter(b => b.paidBy==='kirsten');
  const kyleBillsTotal    = kyleBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenBillsTotal = kirstenBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenOwesBillShare = kyleBillsTotal / 2;
  const kyleOwesBillShare    = kirstenBillsTotal / 2;

  let cardKyleOwes=0, cardKirstenOwes=0;
  cards.forEach(c => {
    const mode = c.splitMode || 'charges';
    if (mode === 'half') {
      const total = parseFloat(c.totalAmount)||0;
      const half  = total / 2;
      if (c.paidBy==='kyle') cardKirstenOwes += half;
      else                    cardKyleOwes    += half;
    } else {
      const ka=parseFloat(c.kyleAmount)||0, kia=parseFloat(c.kirstenAmount)||0;
      if (c.paidBy==='kyle') cardKirstenOwes+=kia; else cardKyleOwes+=ka;
    }
  });
  const cardsTotalMonthly = cards.reduce((s,c) => {
    const mode = c.splitMode || 'charges';
    if (mode==='half') return s + (parseFloat(c.totalAmount)||0);
    return s + (parseFloat(c.kyleAmount)||0) + (parseFloat(c.kirstenAmount)||0);
  }, 0);
  const billNet  = kyleOwesBillShare - kirstenOwesBillShare;
  const cardNet  = cardKyleOwes - cardKirstenOwes;
  const netTransfer = billNet + cardNet;
  const grandTotal = kyleBillsTotal + kirstenBillsTotal + cardsTotalMonthly;

  return {
    grandTotal, kyleBillsTotal, kirstenBillsTotal, processed,
    kyleBills, kirstenBills, kirstenOwesBillShare, kyleOwesBillShare,
    cardKyleOwes, cardKirstenOwes, billNet, cardNet, netTransfer,
    cardsTotalMonthly, cards,
  };
}

// ─── Pie chart ────────────────────────────────────────────────────────────────
function renderPie(s) {
  const mode    = state.pieMode || 'spend';
  const curKey  = monthKey();
  const income  = getIncome(curKey);
  const totalIncome = income.kyle + income.kirsten;

  // Build category spend totals
  const catTotals = {};
  s.processed.forEach(b => {
    const c = b.category||'other';
    catTotals[c] = (catTotals[c]||0) + b.monthly;
  });
  if (s.cardsTotalMonthly > 0) catTotals['credit'] = (catTotals['credit']||0) + s.cardsTotalMonthly;

  const spendEntries = Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const totalSpend   = spendEntries.reduce((s,[,v])=>s+v,0);

  if (!totalSpend) return `<div class="chart-wrap">
    <div class="chart-title">Spending Breakdown</div>
    <div style="text-align:center;padding:24px 0;color:var(--muted);font-size:13px">No spending data yet</div>
  </div>`;

  // In income mode, we show spend slices against income as the full circle
  // Unspent income = income - spend (shown as a grey remainder slice)
  const useIncome = mode === 'income' && totalIncome > 0;
  const denominator = useIncome ? Math.max(totalIncome, totalSpend) : totalSpend;
  const unspent = useIncome ? Math.max(0, totalIncome - totalSpend) : 0;

  // Build SVG donut
  const R=70, r=42, cx=80, cy=80;
  let startAngle = -Math.PI/2;
  let slices = '';

  // Spend slices
  spendEntries.forEach(([cat, val]) => {
    const angle = (val / denominator) * Math.PI * 2;
    const endAngle = startAngle + angle;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(endAngle),   y2=cy+R*Math.sin(endAngle);
    const ix1=cx+r*Math.cos(startAngle),iy1=cy+r*Math.sin(startAngle);
    const ix2=cx+r*Math.cos(endAngle),  iy2=cy+r*Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    const color = CAT_COLORS[cat]||'#64748b';
    slices += `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${r},${r} 0 ${large},0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z"
      fill="${color}" opacity="0.92" stroke="var(--card)" stroke-width="2"/>`;
    startAngle = endAngle;
  });

  // Unspent remainder slice (income mode only)
  if (useIncome && unspent > 0) {
    const angle = (unspent / denominator) * Math.PI * 2;
    const endAngle = startAngle + angle;
    const x1=cx+R*Math.cos(startAngle), y1=cy+R*Math.sin(startAngle);
    const x2=cx+R*Math.cos(endAngle),   y2=cy+R*Math.sin(endAngle);
    const ix1=cx+r*Math.cos(startAngle),iy1=cy+r*Math.sin(startAngle);
    const ix2=cx+r*Math.cos(endAngle),  iy2=cy+r*Math.sin(endAngle);
    const large = angle > Math.PI ? 1 : 0;
    slices += `<path d="M${x1.toFixed(2)},${y1.toFixed(2)} A${R},${R} 0 ${large},1 ${x2.toFixed(2)},${y2.toFixed(2)} L${ix2.toFixed(2)},${iy2.toFixed(2)} A${r},${r} 0 ${large},0 ${ix1.toFixed(2)},${iy1.toFixed(2)} Z"
      fill="#1e293b" opacity="1" stroke="var(--card)" stroke-width="2"/>`;
  }

  // Center label
  const centerTop    = useIncome ? 'of income' : 'Spending';
  const centerVal    = useIncome
    ? Math.round(totalSpend / totalIncome * 100) + '%'
    : fmt(totalSpend).replace('.00','');
  const centerColor  = useIncome
    ? (totalSpend / totalIncome > 0.85 ? '#f87171' : totalSpend / totalIncome > 0.65 ? '#f59e0b' : GREEN)
    : 'var(--text)';

  // Legend
  const legend = spendEntries.map(([cat,val]) => {
    const pct = useIncome && totalIncome > 0
      ? Math.round(val / totalIncome * 100)
      : Math.round(val / totalSpend * 100);
    return `<div class="legend-item">
      <div class="legend-dot" style="background:${CAT_COLORS[cat]||'#64748b'}"></div>
      <span class="legend-name">${cat}</span>
      <span class="legend-pct" style="color:${CAT_COLORS[cat]||'#64748b'}">${pct}%</span>
    </div>`;
  }).join('');

  // Unspent row in income mode
  const unspentRow = useIncome && unspent > 0
    ? `<div class="legend-item">
        <div class="legend-dot" style="background:#1e293b;border:1px solid var(--border2)"></div>
        <span class="legend-name" style="color:${GREEN}">unspent</span>
        <span class="legend-pct" style="color:${GREEN}">${Math.round(unspent/totalIncome*100)}%</span>
      </div>`
    : useIncome && unspent <= 0
    ? `<div style="font-size:10px;color:#f87171;font-weight:700;margin-top:4px">⚠️ Spending exceeds income</div>`
    : '';

  // No-income warning for income mode
  const noIncomeWarning = mode === 'income' && totalIncome === 0
    ? `<div style="text-align:center;padding:8px 0 4px;font-size:11px;color:#f59e0b">Enter income in the Budget tab to see ratios</div>`
    : '';

  // Toggle
  const toggle = `<div class="view-toggle" style="margin-bottom:14px">
    <button class="view-toggle-btn${mode==='spend'?' active':''}" data-action="pie-mode" data-mode="spend">By Spending</button>
    <button class="view-toggle-btn${mode==='income'?' active':''}" data-action="pie-mode" data-mode="income">vs Income</button>
  </div>`;

  // Summary row beneath toggle in income mode
  const summaryRow = useIncome
    ? `<div style="display:flex;justify-content:space-between;align-items:center;
        background:var(--bg);border-radius:10px;padding:10px 14px;margin-bottom:14px;
        border:1px solid var(--border2)">
        <div style="text-align:center">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px">Income</div>
          <div style="font-size:15px;font-weight:800;font-family:monospace;color:${GREEN}">${fmt(totalIncome)}</div>
        </div>
        <div style="font-size:18px;color:var(--muted)">–</div>
        <div style="text-align:center">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px">Spending</div>
          <div style="font-size:15px;font-weight:800;font-family:monospace;color:${KYLE}">${fmt(totalSpend)}</div>
        </div>
        <div style="font-size:18px;color:var(--muted)">=</div>
        <div style="text-align:center">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:3px">${unspent>=0?'Surplus':'Deficit'}</div>
          <div style="font-size:15px;font-weight:800;font-family:monospace;color:${unspent>=0?GREEN:'#f87171'}">${unspent>=0?'+':''}${fmt(unspent)}</div>
        </div>
      </div>`
    : '';

  return `<div class="chart-wrap">
    <div class="chart-title">Spending Breakdown</div>
    ${toggle}
    ${summaryRow}
    ${noIncomeWarning}
    <div class="chart-inner">
      <svg id="pie-svg" width="160" height="160" viewBox="0 0 160 160">
        ${slices}
        <circle cx="${cx}" cy="${cy}" r="${r-2}" fill="var(--card)"/>
        <text x="${cx}" y="${cy-8}" text-anchor="middle" font-size="10" fill="var(--muted)" font-family="-apple-system,sans-serif">${centerTop}</text>
        <text x="${cx}" y="${cx+10}" text-anchor="middle" font-size="${useIncome?16:12}" fill="${centerColor}" font-weight="800" font-family="monospace">${centerVal}</text>
      </svg>
      <div class="chart-legend">${legend}${unspentRow}</div>
    </div>
  </div>`;
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const s = calcSettlement();

  // Header
  document.getElementById('header-total-value').textContent = fmt(s.grandTotal);
  const nameDisplay = document.getElementById('household-name-display');
  if (nameDisplay) nameDisplay.textContent = state.householdName;
  const av1 = document.getElementById('avatar-kyle');
  if (av1) av1.textContent = pInitial('kyle');
  const av2 = document.getElementById('avatar-kirs');
  if (av2) av2.textContent = pInitial('kirsten');
  document.title = state.householdName + ' · Budget';
  const ssEl = document.getElementById('sidebar-status');
  if (ssEl) ssEl.innerHTML = 'System status: <span>● Online</span>';
  document.getElementById('month-label').textContent = `${MONTHS[state.viewMonth]} ${state.viewYear}`;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab===state.activeTab));

  if (isDesktop()) {
    const ma = document.getElementById('main-area');
    if (ma) ma.scrollTop = 0;
  }
  const el = document.getElementById('content');
  if (state.activeTab==='family') {
    el.innerHTML = renderFamily(s);
    if (isDesktop()) applyFamilyDesktopGrid();
  } else if (state.activeTab==='personal') {
    el.innerHTML = renderPersonal(s);
    if (isDesktop()) applyPersonalDesktopGrid();
  } else if (state.activeTab==='insights') {
    el.innerHTML = renderInsights(s);
    if (isDesktop()) applyInsightsDesktopGrid();
  }

  attachEvents();
}
