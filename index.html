<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Budget"/>
<title>Kyle &amp; Kirsten · Budget</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{background:#0f172a;color:#e2e8f0;font-family:-apple-system,system-ui,sans-serif;max-width:600px;margin:0 auto;min-height:100vh}
  input,select,button{font-family:inherit;outline:none;appearance:none;-webkit-appearance:none}
  input[type=number]::-webkit-inner-spin-button{display:none}

  /* Header */
  #header{background:#1e293b;border-bottom:1px solid #334155;padding:env(safe-area-inset-top,16px) 16px 0;position:sticky;top:0;z-index:100}
  #header-top{display:flex;justify-content:space-between;align-items:flex-start;padding-top:4px;margin-bottom:12px}
  #header-eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#64748b;font-weight:600}
  #header-title{font-size:20px;font-weight:700;color:#f1f5f9;letter-spacing:-.02em;margin-top:2px}
  #header-total-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;text-align:right}
  #header-total-value{font-size:22px;font-weight:700;font-family:monospace;color:#f1f5f9;text-align:right}
  #tabs{display:flex}
  .tab{flex:1;padding:10px 4px;border:none;background:transparent;color:#64748b;font-size:12px;font-weight:600;border-bottom:2px solid transparent;cursor:pointer;transition:color .15s}
  .tab.active{color:#38bdf8;border-bottom-color:#38bdf8}

  /* Content */
  #content{padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,16px) + 16px)}

  /* Stat cards */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .stat-card{background:#1e293b;border-radius:10px;padding:12px 14px;border:1px solid #334155}
  .stat-label{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
  .stat-value{font-size:18px;font-weight:700;font-family:monospace;margin-top:4px}

  /* Category group */
  .cat-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;margin-top:16px}
  .cat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
  .cat-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#64748b}
  .cat-total{margin-left:auto;font-size:11px;color:#475569;font-family:monospace}

  /* Bill list */
  .card{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow:hidden;margin-bottom:0}
  .bill-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid #0f172a;cursor:pointer}
  .bill-row:first-child{border-top:none}
  .bill-name{font-size:14px;font-weight:500;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .bill-avg{font-size:11px;color:#475569;margin-top:2px}
  .bill-amount{font-size:15px;font-weight:700;font-family:monospace;color:#f1f5f9;text-align:right}
  .bill-freq{font-size:10px;color:#64748b}
  .chevron{color:#475569;font-size:16px;flex-shrink:0}

  /* Pill */
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
  .pill-kyle{background:#1e3a4c;color:#38bdf8}
  .pill-kirsten{background:#2d1b69;color:#a78bfa}

  /* Edit form */
  .edit-form{padding:12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #0f172a}
  .edit-form:first-child{border-top:none}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .inp{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 12px;color:#e2e8f0;font-size:14px;width:100%}
  .inp::placeholder{color:#475569}
  .btn-row{display:flex;gap:8px}
  .btn-primary{background:#38bdf8;border:none;border-radius:8px;padding:10px 18px;color:#0f172a;font-weight:700;font-size:14px;cursor:pointer;flex:1}
  .btn-secondary{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 18px;color:#94a3b8;font-size:14px;cursor:pointer;flex:1}
  .btn-danger{background:#1e293b;border:1px solid #7f1d1d;border-radius:8px;padding:10px 18px;color:#f87171;font-size:14px;cursor:pointer;flex:1}
  .add-btn{width:100%;background:#1e293b;border:1px dashed #334155;border-radius:10px;padding:14px;color:#64748b;font-size:13px;cursor:pointer;font-weight:500;margin-top:12px}

  /* Add form */
  .add-form{background:#1e293b;border-radius:10px;border:1px solid #334155;padding:14px;margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .add-form-title{font-size:12px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
  .charge-label{font-size:11px;font-weight:600;margin-bottom:4px}

  /* Card item */
  .cc-card{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow:hidden;margin-bottom:12px}
  .cc-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #0f172a;cursor:pointer}
  .cc-name{font-size:14px;font-weight:600;color:#f1f5f9;margin-left:8px}
  .cc-grid{display:grid;grid-template-columns:1fr 1fr}
  .cc-cell{padding:10px 14px}
  .cc-cell-right{border-left:1px solid #0f172a}
  .cc-cell-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}
  .cc-cell-value{font-size:18px;font-weight:700;font-family:monospace;margin-top:3px}
  .cc-footer{padding:8px 14px;background:#0f172a44;display:flex;justify-content:space-between;align-items:center}
  .cc-footer-total{font-size:11px;color:#64748b}
  .cc-footer-owed{font-size:11px;color:#34d399;font-weight:600}

  /* Settlement */
  .transfer-card{border-radius:14px;padding:24px 20px;margin-bottom:20px;text-align:center}
  .transfer-label{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:#64748b;font-weight:600;margin-bottom:6px}
  .transfer-amount{font-size:44px;font-weight:800;font-family:monospace;letter-spacing:-.02em;margin-bottom:6px}
  .transfer-direction{font-size:14px;color:#94a3b8}
  .breakdown-card{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow:hidden;margin-bottom:14px}
  .breakdown-head{padding:12px 16px;border-bottom:1px solid #334155;background:#0f172a44;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#64748b}
  .sec-header{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#ffffff08}
  .sec-header-label{font-size:12px;font-weight:700}
  .sec-header-value{font-size:13px;font-family:monospace;font-weight:700}
  .brow{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #0f172a33}
  .brow-label{font-size:13px;color:#94a3b8}
  .brow-label.indent{font-size:12px;color:#475569;padding-left:12px}
  .brow-note{font-size:10px;color:#64748b;margin-left:6px}
  .brow-value{font-size:13px;font-family:monospace;color:#94a3b8}
  .brow-value.colored{font-weight:600}
  .brow-value.indent{font-size:12px;color:#475569}
  .divider{height:1px;background:#0f172a}
  .net-row{padding:14px 16px;background:#0f172a55}
  .net-row-top{display:flex;justify-content:space-between;align-items:center}
  .net-label{font-size:13px;font-weight:700;color:#e2e8f0}
  .net-value{font-size:18px;font-weight:800;font-family:monospace;color:#34d399}
  .net-sub{font-size:11px;color:#475569;margin-top:6px}
  .water-card{background:#0f2318;border:1px solid #14532d44;border-radius:10px;padding:14px 16px}
  .water-title{font-size:11px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
  .water-sub{font-size:12px;color:#475569;margin-bottom:10px}
  .water-row{display:flex;gap:8px;align-items:center}
  .water-avg{font-size:12px;color:#64748b}
  .hint{font-size:12px;color:#64748b;line-height:1.5;margin-bottom:14px}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div>
      <div id="header-eyebrow">Household Budget</div>
      <div id="header-title">Kyle &amp; Kirsten</div>
    </div>
    <div>
      <div id="header-total-label">Monthly Total</div>
      <div id="header-total-value" id="grand-total">—</div>
    </div>
  </div>
  <div id="tabs">
    <button class="tab active" data-tab="bills">📋 Bills</button>
    <button class="tab" data-tab="cards">💳 Cards</button>
    <button class="tab" data-tab="settlement">⚖️ Split</button>
  </div>
</div>

<div id="content"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let state = {
  activeTab: "bills",
  editingBill: null,
  editingCard: null,
  showAddBill: false,
  showAddCard: false,
  bills: [
    {id:1, name:"Xcel Energy",  amount:158,  frequency:"monthly",   paidBy:"kyle",    category:"utilities"},
    {id:2, name:"Quantum",      amount:80,   frequency:"monthly",   paidBy:"kyle",    category:"utilities"},
    {id:3, name:"Water",        amount:0,    frequency:"quarterly", paidBy:"kyle",    category:"utilities"},
    {id:4, name:"State Farm",   amount:225,  frequency:"monthly",   paidBy:"kyle",    category:"insurance"},
    {id:5, name:"Natural Gas",  amount:60,   frequency:"monthly",   paidBy:"kyle",    category:"utilities"},
    {id:6, name:"Mortgage",     amount:1750, frequency:"monthly",   paidBy:"kirsten", category:"housing"},
    {id:7, name:"Car Payment",  amount:670,  frequency:"monthly",   paidBy:"kirsten", category:"auto"},
  ],
  cards: [
    {id:101, name:"Chase Sapphire", kyleAmount:0, kirstenAmount:0, paidBy:"kyle"},
    {id:102, name:"Prime Visa",     kyleAmount:0, kirstenAmount:0, paidBy:"kirsten"},
  ],
  nextBillId: 8,
  nextCardId: 103,
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(n||0);
const toMonthly = (a,f) => f==="quarterly" ? a/3 : f==="annual" ? a/12 : a;
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

const CAT_COLOR = {housing:"#6366f1",utilities:"#0ea5e9",insurance:"#10b981",auto:"#f59e0b",subscriptions:"#ec4899",other:"#94a3b8"};
const CATS = ["housing","utilities","insurance","auto","subscriptions","other"];

function pill(who) {
  const cls = who==="kyle" ? "pill-kyle" : "pill-kirsten";
  const label = who==="kyle" ? "Kyle" : "Kirsten";
  return `<span class="pill ${cls}">${label}</span>`;
}

function calcSettlement() {
  const processed = state.bills.map(b => ({...b, monthly: toMonthly(parseFloat(b.amount)||0, b.frequency)}));
  const kyleBills    = processed.filter(b => b.paidBy==="kyle");
  const kirstenBills = processed.filter(b => b.paidBy==="kirsten");
  const kyleBillsTotal    = kyleBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenBillsTotal = kirstenBills.reduce((s,b)=>s+b.monthly,0);
  const kirstenOwesBillShare = kyleBillsTotal/2;
  const kyleOwesBillShare    = kirstenBillsTotal/2;

  let cardKyleOwes=0, cardKirstenOwes=0;
  state.cards.forEach(c => {
    const ka=parseFloat(c.kyleAmount)||0, kia=parseFloat(c.kirstenAmount)||0;
    if (c.paidBy==="kyle") cardKirstenOwes+=kia; else cardKyleOwes+=ka;
  });
  const cardsTotalMonthly = state.cards.reduce((s,c)=>s+(parseFloat(c.kyleAmount)||0)+(parseFloat(c.kirstenAmount)||0),0);
  const billNet  = kyleOwesBillShare - kirstenOwesBillShare;
  const cardNet  = cardKyleOwes - cardKirstenOwes;
  const netTransfer = billNet + cardNet;
  const grandTotal = kyleBillsTotal + kirstenBillsTotal + cardsTotalMonthly;

  return {grandTotal, kyleBillsTotal, kirstenBillsTotal, kyleBills, kirstenBills,
    kirstenOwesBillShare, kyleOwesBillShare, cardKyleOwes, cardKirstenOwes,
    billNet, cardNet, netTransfer, cardsTotalMonthly, processed};
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const s = calcSettlement();

  // Update header total
  document.getElementById("header-total-value").textContent = fmt(s.grandTotal);

  // Tabs
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.tab === state.activeTab);
  });

  const el = document.getElementById("content");

  if (state.activeTab === "bills") el.innerHTML = renderBills(s);
  else if (state.activeTab === "cards") el.innerHTML = renderCards(s);
  else el.innerHTML = renderSettlement(s);

  attachEvents();
}

// ─── Bills Tab ────────────────────────────────────────────────────────────────
function renderBills(s) {
  let html = `<div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Kyle pays</div><div class="stat-value" style="color:#38bdf8">${fmt(s.kyleBillsTotal)}</div></div>
    <div class="stat-card"><div class="stat-label">Kirsten pays</div><div class="stat-value" style="color:#a78bfa">${fmt(s.kirstenBillsTotal)}</div></div>
  </div>`;

  // Group by category
  const groups = {};
  CATS.forEach(c => groups[c]=[]);
  s.processed.forEach(b => { const c=b.category||"other"; if(!groups[c])groups[c]=[]; groups[c].push(b); });

  Object.entries(groups).forEach(([cat, items]) => {
    if (!items.length) return;
    const catTotal = items.reduce((sum,b)=>sum+b.monthly,0);
    const color = CAT_COLOR[cat]||"#94a3b8";
    html += `<div class="cat-header">
      <span class="cat-dot" style="background:${color}"></span>
      <span class="cat-name">${esc(cat)}</span>
      <span class="cat-total">${fmt(catTotal)}/mo</span>
    </div><div class="card">`;

    items.forEach(bill => {
      if (state.editingBill === bill.id) {
        html += renderBillEditForm(bill);
      } else {
        html += `<div class="bill-row" data-action="edit-bill" data-id="${bill.id}">
          <div style="flex:1;min-width:0">
            <div class="bill-name">${esc(bill.name)}</div>
            ${bill.frequency!=="monthly" ? `<div class="bill-avg">${fmt(bill.monthly)}/mo avg</div>` : ""}
          </div>
          ${pill(bill.paidBy)}
          <div style="text-align:right;min-width:70px">
            <div class="bill-amount">${fmt(bill.amount)}</div>
            ${bill.frequency!=="monthly" ? `<div class="bill-freq">/${bill.frequency[0]}</div>` : ""}
          </div>
          <span class="chevron">›</span>
        </div>`;
      }
    });
    html += `</div>`;
  });

  if (state.showAddBill) {
    html += `<div class="add-form">
      <div class="add-form-title">New Bill</div>
      <input class="inp" id="nb-name" placeholder="Bill name" value=""/>
      <div class="form-row">
        <input class="inp" id="nb-amount" type="number" inputmode="decimal" placeholder="Amount"/>
        <select class="inp" id="nb-freq">
          <option value="monthly">Monthly</option>
          <option value="quarterly">Quarterly</option>
          <option value="annual">Annual</option>
        </select>
      </div>
      <div class="form-row">
        <select class="inp" id="nb-payer">
          <option value="kyle">Kyle pays</option>
          <option value="kirsten">Kirsten pays</option>
        </select>
        <select class="inp" id="nb-cat">
          ${CATS.map(c=>`<option value="${c}">${c}</option>`).join("")}
        </select>
      </div>
      <div class="btn-row">
        <button class="btn-primary" data-action="confirm-add-bill">Add Bill</button>
        <button class="btn-secondary" data-action="cancel-add-bill">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<button class="add-btn" data-action="show-add-bill">+ Add Bill</button>`;
  }
  return html;
}

function renderBillEditForm(bill) {
  return `<div class="edit-form">
    <input class="inp" data-field="name" data-id="${bill.id}" data-type="bill" value="${esc(bill.name)}" placeholder="Bill name"/>
    <div class="form-row">
      <input class="inp" data-field="amount" data-id="${bill.id}" data-type="bill" type="number" inputmode="decimal" value="${bill.amount}" placeholder="Amount" style="font-family:monospace"/>
      <select class="inp" data-field="frequency" data-id="${bill.id}" data-type="bill">
        ${["monthly","quarterly","annual"].map(f=>`<option value="${f}"${bill.frequency===f?" selected":""}>${f.charAt(0).toUpperCase()+f.slice(1)}</option>`).join("")}
      </select>
    </div>
    <div class="form-row">
      <select class="inp" data-field="paidBy" data-id="${bill.id}" data-type="bill">
        <option value="kyle"${bill.paidBy==="kyle"?" selected":""}>Kyle pays</option>
        <option value="kirsten"${bill.paidBy==="kirsten"?" selected":""}>Kirsten pays</option>
      </select>
      <select class="inp" data-field="category" data-id="${bill.id}" data-type="bill">
        ${CATS.map(c=>`<option value="${c}"${bill.category===c?" selected":""}>${c}</option>`).join("")}
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-primary" data-action="done-edit-bill" data-id="${bill.id}">Done</button>
      <button class="btn-danger" data-action="delete-bill" data-id="${bill.id}">Delete</button>
    </div>
  </div>`;
}

// ─── Cards Tab ────────────────────────────────────────────────────────────────
function renderCards(s) {
  let html = `<p class="hint">Enter each person's charges this month. The cardholder fronts the full balance — the other person owes their portion.</p>`;

  state.cards.forEach(card => {
    const ka  = parseFloat(card.kyleAmount)||0;
    const kia = parseFloat(card.kirstenAmount)||0;
    const total = ka+kia;
    const owedByOther = card.paidBy==="kyle" ? kia : ka;
    const otherName   = card.paidBy==="kyle" ? "Kirsten" : "Kyle";

    html += `<div class="cc-card">`;
    if (state.editingCard === card.id) {
      html += `<div class="edit-form" style="border-top:none">
        <input class="inp" data-field="name" data-id="${card.id}" data-type="card" value="${esc(card.name)}" placeholder="Card name"/>
        <select class="inp" data-field="paidBy" data-id="${card.id}" data-type="card">
          <option value="kyle"${card.paidBy==="kyle"?" selected":""}>Kyle pays the bill</option>
          <option value="kirsten"${card.paidBy==="kirsten"?" selected":""}>Kirsten pays the bill</option>
        </select>
        <div class="form-row">
          <div>
            <div class="charge-label" style="color:#38bdf8">Kyle's charges</div>
            <input class="inp" data-field="kyleAmount" data-id="${card.id}" data-type="card" type="number" inputmode="decimal" value="${card.kyleAmount||""}" placeholder="0.00" style="font-family:monospace;color:#38bdf8"/>
          </div>
          <div>
            <div class="charge-label" style="color:#a78bfa">Kirsten's charges</div>
            <input class="inp" data-field="kirstenAmount" data-id="${card.id}" data-type="card" type="number" inputmode="decimal" value="${card.kirstenAmount||""}" placeholder="0.00" style="font-family:monospace;color:#a78bfa"/>
          </div>
        </div>
        <div class="btn-row">
          <button class="btn-primary" data-action="done-edit-card" data-id="${card.id}">Done</button>
          <button class="btn-danger" data-action="delete-card" data-id="${card.id}">Delete</button>
        </div>
      </div>`;
    } else {
      html += `<div class="cc-header" data-action="edit-card" data-id="${card.id}">
        <div style="display:flex;align-items:center">
          <span style="font-size:18px">💳</span>
          <span class="cc-name">${esc(card.name)}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">${pill(card.paidBy)}<span class="chevron">›</span></div>
      </div>
      <div class="cc-grid" data-action="edit-card" data-id="${card.id}" style="cursor:pointer">
        <div class="cc-cell">
          <div class="cc-cell-label" style="color:#38bdf8">Kyle</div>
          <div class="cc-cell-value" style="color:${ka>0?"#38bdf8":"#334155"}">${fmt(ka)}</div>
        </div>
        <div class="cc-cell cc-cell-right">
          <div class="cc-cell-label" style="color:#a78bfa">Kirsten</div>
          <div class="cc-cell-value" style="color:${kia>0?"#a78bfa":"#334155"}">${fmt(kia)}</div>
        </div>
      </div>
      <div class="cc-footer">
        <span class="cc-footer-total">Total: <span style="font-family:monospace;color:#94a3b8">${fmt(total)}</span></span>
        ${owedByOther>0 ? `<span class="cc-footer-owed">${esc(otherName)} owes ${fmt(owedByOther)}</span>` : ""}
      </div>`;
    }
    html += `</div>`;
  });

  if (state.showAddCard) {
    html += `<div class="add-form">
      <div class="add-form-title">New Card</div>
      <input class="inp" id="nc-name" placeholder="Card name (e.g. Citi Double Cash)"/>
      <select class="inp" id="nc-payer">
        <option value="kyle">Kyle pays the bill</option>
        <option value="kirsten">Kirsten pays the bill</option>
      </select>
      <div class="form-row">
        <div>
          <div class="charge-label" style="color:#38bdf8">Kyle's charges</div>
          <input class="inp" id="nc-kyle" type="number" inputmode="decimal" placeholder="0.00" style="font-family:monospace"/>
        </div>
        <div>
          <div class="charge-label" style="color:#a78bfa">Kirsten's charges</div>
          <input class="inp" id="nc-kirsten" type="number" inputmode="decimal" placeholder="0.00" style="font-family:monospace"/>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" data-action="confirm-add-card">Add Card</button>
        <button class="btn-secondary" data-action="cancel-add-card">Cancel</button>
      </div>
    </div>`;
  } else {
    html += `<button class="add-btn" data-action="show-add-card">+ Add Card</button>`;
  }
  return html;
}

// ─── Settlement Tab ───────────────────────────────────────────────────────────
function renderSettlement(s) {
  const nt = s.netTransfer;
  const transferBg   = nt>0 ? "linear-gradient(135deg,#0c2233 0%,#0f172a 100%)"
                     : nt<0 ? "linear-gradient(135deg,#1a0c33 0%,#0f172a 100%)"
                     :        "linear-gradient(135deg,#0c2318 0%,#0f172a 100%)";
  const borderColor  = nt>0 ? "#0ea5e9" : nt<0 ? "#7c3aed" : "#14532d";
  const amountColor  = nt>0 ? "#38bdf8" : nt<0 ? "#a78bfa" : "#34d399";
  const directionHtml = nt>0
    ? `<span style="color:#38bdf8;font-weight:600">Kyle</span> → <span style="color:#a78bfa;font-weight:600">Kirsten</span>`
    : nt<0
    ? `<span style="color:#a78bfa;font-weight:600">Kirsten</span> → <span style="color:#38bdf8;font-weight:600">Kyle</span>`
    : `Perfectly balanced ✓`;

  const brows = (label,value,indent,color,note) => {
    const lc = indent ? "brow-label indent" : "brow-label";
    const vc = indent ? "brow-value indent" : `brow-value${color?" colored":""}`;
    const noteHtml = note ? `<span class="brow-note">(${note})</span>` : "";
    return `<div class="brow" style="padding:7px ${indent?28:16}px">
      <div><span class="${lc}">${esc(label)}</span>${noteHtml}</div>
      <span class="${vc}" style="${color?`color:${color}`:""}">${esc(value)}</span>
    </div>`;
  };

  const secHead = (label,value,color) =>
    `<div class="sec-header">
      <span class="sec-header-label" style="color:${color}">${esc(label)}</span>
      <span class="sec-header-value" style="color:${color}">${esc(value)}</span>
    </div>`;

  let breakdown = "";
  breakdown += secHead("Bills Kyle pays", fmt(s.kyleBillsTotal), "#38bdf8");
  s.kyleBills.forEach(b => { breakdown += brows(b.name, fmt(b.monthly)+"/mo", true); });
  breakdown += brows("Kirsten's half of Kyle's bills", fmt(s.kirstenOwesBillShare), false, "#f87171", "Kirsten owes Kyle");
  breakdown += `<div class="divider"></div>`;
  breakdown += secHead("Bills Kirsten pays", fmt(s.kirstenBillsTotal), "#a78bfa");
  s.kirstenBills.forEach(b => { breakdown += brows(b.name, fmt(b.monthly)+"/mo", true); });
  breakdown += brows("Kyle's half of Kirsten's bills", fmt(s.kyleOwesBillShare), false, "#34d399", "Kyle owes Kirsten");

  if (s.cardsTotalMonthly > 0) {
    breakdown += `<div class="divider"></div>`;
    breakdown += secHead("Credit cards", fmt(s.cardsTotalMonthly), "#f59e0b");
    state.cards.forEach(c => {
      const ka=parseFloat(c.kyleAmount)||0, kia=parseFloat(c.kirstenAmount)||0;
      const owedByOther = c.paidBy==="kyle" ? kia : ka;
      const otherName   = c.paidBy==="kyle" ? "Kirsten" : "Kyle";
      if (owedByOther>0) breakdown += brows(c.name, fmt(owedByOther), true, null, `${otherName} owes`);
    });
    if (s.cardKyleOwes>0)    breakdown += brows("Kyle owes (cards)",    fmt(s.cardKyleOwes),    false,"#34d399");
    if (s.cardKirstenOwes>0) breakdown += brows("Kirsten owes (cards)", fmt(s.cardKirstenOwes), false,"#f87171");
  }

  breakdown += `<div class="divider"></div>`;
  breakdown += `<div class="net-row">
    <div class="net-row-top">
      <span class="net-label">${nt>=0?"Kyle sends Kirsten":"Kirsten sends Kyle"}</span>
      <span class="net-value">${fmt(Math.abs(nt))}</span>
    </div>
    <div class="net-sub">
      Bills net: ${fmt(Math.abs(s.billNet))} ${s.billNet>=0?"(Kyle→Kirsten)":"(Kirsten→Kyle)"}
      ${s.cardsTotalMonthly>0 ? ` · Cards net: ${fmt(Math.abs(s.cardNet))} ${s.cardNet>=0?"(Kyle→Kirsten)":"(Kirsten→Kyle)"}` : ""}
    </div>
  </div>`;

  const waterBill = state.bills.find(b=>b.name==="Water");
  const waterAmt  = parseFloat(waterBill?.amount)||0;

  return `
    <div class="transfer-card" style="background:${transferBg};border:1px solid ${borderColor}44">
      <div class="transfer-label">This Month's Transfer</div>
      <div class="transfer-amount" style="color:${amountColor}">${fmt(Math.abs(nt))}</div>
      <div class="transfer-direction">${directionHtml}</div>
    </div>
    <div class="breakdown-card">
      <div class="breakdown-head">How It's Calculated</div>
      ${breakdown}
    </div>
    <div class="water-card">
      <div class="water-title">💧 Water Bill (Quarterly)</div>
      <div class="water-sub">Enter the quarterly amount to include it in monthly averages.</div>
      <div class="water-row">
        <input class="inp" id="water-input" type="number" inputmode="decimal" placeholder="e.g. 90" value="${waterAmt||""}" style="width:110px;font-family:monospace;color:#4ade80"/>
        <span class="water-avg">= ${fmt(waterAmt/3)}/mo</span>
      </div>
    </div>`;
}

// ─── Event Delegation ─────────────────────────────────────────────────────────
function attachEvents() {
  const content = document.getElementById("content");

  // Live field updates (bills & cards)
  content.querySelectorAll("[data-field]").forEach(el => {
    el.addEventListener("input", () => {
      const id   = parseInt(el.dataset.id);
      const field = el.dataset.field;
      const type  = el.dataset.type;
      const value = el.type==="number" ? (parseFloat(el.value)||0) : el.value;
      if (type==="bill") {
        state.bills = state.bills.map(b => b.id===id ? {...b,[field]:value} : b);
      } else {
        state.cards = state.cards.map(c => c.id===id ? {...c,[field]:value} : c);
      }
      // Re-render header total only (avoid losing focus in form)
      document.getElementById("header-total-value").textContent = fmt(calcSettlement().grandTotal);
    });
    el.addEventListener("change", () => {
      const id   = parseInt(el.dataset.id);
      const field = el.dataset.field;
      const type  = el.dataset.type;
      const value = el.type==="number" ? (parseFloat(el.value)||0) : el.value;
      if (type==="bill") {
        state.bills = state.bills.map(b => b.id===id ? {...b,[field]:value} : b);
      } else {
        state.cards = state.cards.map(c => c.id===id ? {...c,[field]:value} : c);
      }
      render();
    });
  });

  // Water input
  const waterInput = document.getElementById("water-input");
  if (waterInput) {
    waterInput.addEventListener("input", () => {
      const val = parseFloat(waterInput.value)||0;
      state.bills = state.bills.map(b => b.name==="Water" ? {...b,amount:val} : b);
      const avgEl = waterInput.closest(".water-row").querySelector(".water-avg");
      if (avgEl) avgEl.textContent = `= ${fmt(val/3)}/mo`;
      document.getElementById("header-total-value").textContent = fmt(calcSettlement().grandTotal);
    });
  }

  // Action buttons
  content.querySelectorAll("[data-action]").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      const action = el.dataset.action;
      const id     = el.dataset.id ? parseInt(el.dataset.id) : null;

      if (action==="edit-bill")         { state.editingBill = id; render(); }
      else if (action==="done-edit-bill") { state.editingBill = null; render(); }
      else if (action==="delete-bill")  { state.bills = state.bills.filter(b=>b.id!==id); state.editingBill=null; render(); }
      else if (action==="edit-card")    { state.editingCard = id; render(); }
      else if (action==="done-edit-card") { state.editingCard = null; render(); }
      else if (action==="delete-card")  { state.cards = state.cards.filter(c=>c.id!==id); state.editingCard=null; render(); }
      else if (action==="show-add-bill")   { state.showAddBill=true; render(); }
      else if (action==="cancel-add-bill") { state.showAddBill=false; render(); }
      else if (action==="show-add-card")   { state.showAddCard=true; render(); }
      else if (action==="cancel-add-card") { state.showAddCard=false; render(); }

      else if (action==="confirm-add-bill") {
        const name   = document.getElementById("nb-name").value.trim();
        const amount = parseFloat(document.getElementById("nb-amount").value)||0;
        const freq   = document.getElementById("nb-freq").value;
        const paidBy = document.getElementById("nb-payer").value;
        const cat    = document.getElementById("nb-cat").value;
        if (!name) return;
        state.bills.push({id:state.nextBillId++, name, amount, frequency:freq, paidBy, category:cat});
        state.showAddBill=false; render();
      }
      else if (action==="confirm-add-card") {
        const name    = document.getElementById("nc-name").value.trim();
        const paidBy  = document.getElementById("nc-payer").value;
        const kyleAmt = parseFloat(document.getElementById("nc-kyle").value)||0;
        const kirsAmt = parseFloat(document.getElementById("nc-kirsten").value)||0;
        if (!name) return;
        state.cards.push({id:state.nextCardId++, name, paidBy, kyleAmount:kyleAmt, kirstenAmount:kirsAmt});
        state.showAddCard=false; render();
      }
    });
  });
}

// ─── Tab clicks ───────────────────────────────────────────────────────────────
document.getElementById("tabs").addEventListener("click", e => {
  const tab = e.target.closest("[data-tab]");
  if (!tab) return;
  state.activeTab = tab.dataset.tab;
  state.editingBill = null;
  state.editingCard = null;
  state.showAddBill = false;
  state.showAddCard = false;
  render();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
